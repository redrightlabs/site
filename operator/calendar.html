<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar · RedRight</title>

<style>
:root{
  --bg:#07080b;
  --panel:#0f1217;
  --text:#efe8df;
  --muted:#a0a9b5;
  --line:rgba(255,255,255,.08);
  --accent:#ff4d4d;
  --radius:18px;
  --sans:system-ui,-apple-system;
}

body{
  margin:0;
  background:linear-gradient(#06070a,#090b0f);
  color:var(--text);
  font-family:var(--sans);
}

  .shell{
    max-width:540px;
    margin:0 auto;
    padding:16px;
  }

.top-nav{
  position:sticky;
  top:0;
  z-index:20;
  padding-bottom:10px;
  background:linear-gradient(#06070a,#090b0f);
  backdrop-filter:blur(10px);
}
.back-top{
  position:fixed;
  right:16px;
  bottom:20px;
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}
.back-top:hover{
  background:rgba(255,255,255,.08);
}

/* =========================
   JUMP CONTROLS
========================= */

.jump-row{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
}

.jump-btn{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--text);
  font-size:12px;
  cursor:pointer;
}

/* =========================
   WEEK STRIP
========================= */

.week-strip{
  display:flex;
  justify-content:space-between;
  gap:4px;
  margin-bottom:12px;
}

.day-pill{
  flex:1;
  text-align:center;
  padding:6px 0;
  border-radius:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
}

.day-pill.active{
  color:#fff;
  background:rgba(255,77,77,.12);
}

.day-pill:hover{
  color:#fff;
  background:rgba(255,255,255,.05);
}

.day-dot{
  margin-top:2px;
  font-size:10px;
  color:var(--accent);
  opacity:.9;
}

/* =========================
   TIMELINE
========================= */

/* Destination focus */
.day-section.is-focused{
  outline:1px solid rgba(255,77,77,.28);
  box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35);
  animation:dayFocusFade 520ms ease-out;
}

@keyframes dayFocusFade{
  0%{ box-shadow:0 0 0 2px rgba(255,77,77,.35) inset, 0 16px 36px rgba(0,0,0,.45); }
  100%{ box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35); }
}

/* Week pill pulse */
.day-pill.pulse{
  animation:pillPulse 380ms ease-out;
}

@keyframes pillPulse{
  0%{ transform:scale(1); background:rgba(255,77,77,.12); }
  40%{ transform:scale(1.06); background:rgba(255,77,77,.18); }
  100%{ transform:scale(1); background:rgba(255,77,77,.12); }
}



.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}


.day-section{
  padding:12px 10px 10px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--panel);
}

.day-header{
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--muted);
}
.time-slot{
  display:grid;
  grid-template-columns:56px 1fr;
  gap:8px;
  align-items:start;
  margin-bottom:8px;
}

.time-slot:last-child{
  margin-bottom:0;
}

.slot-time{
  padding-top:8px;
  color:rgba(233,232,223,.62);
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
  white-space:nowrap;
}

.slot-stack{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.lens-row{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:10px;
}

.lens-btn{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  font-size:12px;
  cursor:pointer;
}

.lens-btn.active{
  color:#fff;
  background:rgba(255,77,77,.12);
  border-color:rgba(255,77,77,.18);
}
.artist-filter-row{
  display:none;
  justify-content:center;
  margin-bottom:10px;
}

.artist-filter-row.is-visible{
  display:flex;
}

.artist-select{
  min-width:180px;
  padding:10px 14px;
  border-radius:14px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:var(--text);
  font-size:13px;
  font-family:var(--sans);
}
.appt-ghost{
  opacity:.45;
}
/* =========================
   APPOINTMENTS
========================= */

.appt{
  padding:9px 10px;
  border-radius:12px;
  background:rgba(255,255,255,.04);
  margin-bottom:0;
  font-size:13px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.appt:last-child{
  margin-bottom:0;
}
.appt-time{
  flex:0 0 auto;
  min-width:70px;
  color:var(--text);
  font-weight:600;
  white-space:nowrap;
}

.appt-client{
  flex:1 1 auto;
  min-width:0;
  color:var(--text);
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.appt-artist{
  flex:0 0 auto;
  color:var(--muted);
  white-space:nowrap;
}
.appt,
.isla{
  transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}

.appt:hover,
.isla:hover{
  transform:translateY(-1px);
}

.appt:active,
.isla:active{
  transform:scale(.99);
}
/* =========================
   ISLA BLOCKS
========================= */

.isla{
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,77,77,.08);
  border:1px solid rgba(255,77,77,.2);
  font-size:12px;
  margin-bottom:0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.isla-type{
  flex:0 0 auto;
  font-weight:600;
  color:#ffdede;
  white-space:nowrap;
}

.isla-client{
  flex:1 1 auto;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.isla-detail{
  flex:0 0 auto;
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
</style>
</head>

<body>
<div class="shell">
  <div class="top-nav">
      <div class="lens-row">
    <button class="lens-btn active" data-lens="shop" onclick="setLens('shop', event)">Shop</button>
    <button class="lens-btn" data-lens="artist" onclick="setLens('artist', event)">Artist</button>
    <button class="lens-btn" data-lens="isla" onclick="setLens('isla', event)">Isla</button>
  </div>

  <div class="artist-filter-row" id="artist-filter-row">
    <select class="artist-select" id="artist-select" onchange="setArtist(this.value)">
      <option value="Jake">Jake</option>
      <option value="Lena">Lena</option>
    </select>
  </div>

  <!-- JUMP CONTROLS -->
  <div class="jump-row">
    <button class="jump-btn" onclick="scrollToWeek(-1)">← Week</button>
    <button class="jump-btn" onclick="scrollToDay('today')">Today</button>
    <button class="jump-btn" onclick="scrollToWeek(1)">Week →</button>
    <button class="jump-btn" onclick="scrollToMonth(1)">+ Month</button>
  </div>

  <!-- WEEK STRIP -->
  <div class="week-strip" id="week-strip"></div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline" id="timeline"></div>

<\/div>

<button id="back-to-top" class="back-top">↑</button>

<script>

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const timelineEl = document.getElementById("timeline");
const stripEl = document.getElementById("week-strip");
const artistFilterRowEl = document.getElementById("artist-filter-row");
const artistSelectEl = document.getElementById("artist-select");
const topNavEl = document.querySelector(".top-nav");
let today = new Date();
let baseDate = new Date(today);
let currentLens = "shop";
let currentArtist = "Jake";
let isProgrammaticScroll = false;
let scrollSyncTicking = false;

const MOTION_PRESETS = {
  tap:   { duration: 240, easing: "easeOutCubic", focusDelay: 140 },
  today: { duration: 320, easing: "easeOutQuart", focusDelay: 120 },
  week:  { duration: 520, easing: "easeInOutCubic", focusDelay: 150 },
  month: { duration: 720, easing: "easeInOutQuint", focusDelay: 170 }
};

function getTopOffset() {
  const navHeight = topNavEl ? topNavEl.getBoundingClientRect().height : 0;
  return Math.round(navHeight + 10);
}
function getDayActivityDot(date){
  const dayKey = date.toDateString();

  const shopAppointments = [
    { date: dayKey, time: "12:00 PM", artist: "Jake" },
    { date: dayKey, time: "12:00 PM", artist: "Lena" },
    { date: dayKey, time: "2:30 PM", artist: "Jake" }
  ];

  const islaActions = [
    { date: dayKey, time: "12:00 PM", type: "CareWatch" },
    { date: dayKey, time: "2:30 PM", type: "Review" }
  ];

  let count = 0;

  if (currentLens === "shop") {
    count = shopAppointments.length;
  }

  if (currentLens === "artist") {
    count = shopAppointments.filter((a) => a.artist === currentArtist).length;
  }

  if (currentLens === "isla") {
    count = islaActions.length;
  }

  if (count === 0) return "";
  if (count <= 2) return "•";
  if (count <= 4) return "••";
  return "•••";
}

/* =========================
   BUILD WEEK STRIP
========================= */

function buildWeekStrip(){
  stripEl.innerHTML = "";

  for(let i=0;i<7;i++){
    const d = new Date(baseDate);
    d.setDate(baseDate.getDate() - baseDate.getDay() + i);

    const el = document.createElement("div");
    el.className = "day-pill";
    if (d.toDateString() === baseDate.toDateString()) el.classList.add("active");
    el.dataset.date = d.toDateString();

    const dot = getDayActivityDot(d);

    el.innerHTML = `
      <div>${DAYS[d.getDay()]}</div>
      <div>${d.getDate()}</div>
      <div class="day-dot">${dot}</div>
    `;

    el.onclick = () => scrollToDate(d);

    stripEl.appendChild(el);
  }
}
function setActiveStripDay(dateString) {
  document.querySelectorAll(".day-pill").forEach((pill) => {
    pill.classList.toggle("active", pill.dataset.date === dateString);
  });
}

// ========== Premium micro-interactions ==========
function pulseActivePill(dateString, shouldPulse = true){
  if (!shouldPulse) return;
  const pill = document.querySelector(`.day-pill[data-date="${dateString}"]`);
  if(!pill) return;
  pill.classList.remove("pulse");
  void pill.offsetWidth;
  pill.classList.add("pulse");
}

function focusDaySection(el, shouldFocus = true){
  if(!el || !shouldFocus) return;
  el.classList.remove("is-focused");
  void el.offsetWidth;
  el.classList.add("is-focused");
  setTimeout(() => el.classList.remove("is-focused"), 520);
}

function clampScrollY(y){
  const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
  return Math.max(0, Math.min(maxY, y));
}

function getScrollEasing(name, t){
  if (name === "easeOutQuart") {
    return 1 - Math.pow(1 - t, 4);
  }

  if (name === "easeInOutQuint") {
    return t < 0.5
      ? 16 * Math.pow(t, 5)
      : 1 - Math.pow(-2 * t + 2, 5) / 2;
  }

  if (name === "easeInOutCubic") {
    return t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  return 1 - Math.pow(1 - t, 3);
}

function getDayTargetY(date){
  const el = document.getElementById("day-" + date.toDateString());
  if (!el) return null;

  const targetY = clampScrollY(window.scrollY + el.getBoundingClientRect().top - getTopOffset());
  return { el, targetY, dateString: date.toDateString() };
}

function animateScrollTo(targetY, { duration, easing, onComplete } = {}){
  const startY = window.scrollY;
  const endY = clampScrollY(targetY);
  const distance = endY - startY;

  if (Math.abs(distance) < 2) {
    window.scrollTo(0, endY);
    if (typeof onComplete === "function") onComplete();
    return;
  }

  const startTime = performance.now();
  isProgrammaticScroll = true;

  function frame(now){
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    const eased = getScrollEasing(easing, t);
    window.scrollTo(0, startY + (distance * eased));

    if (t < 1) {
      requestAnimationFrame(frame);
      return;
    }

    window.scrollTo(0, endY);
    isProgrammaticScroll = false;
    if (typeof onComplete === "function") onComplete();
  }

  requestAnimationFrame(frame);
}

function navigateToDate(date, motion = "tap", options = {}){
  const target = getDayTargetY(date);
  if (!target) return;

  const preset = MOTION_PRESETS[motion] || MOTION_PRESETS.tap;
  const {
    updateStrip = true,
    pulse = motion !== "today",
    focus = true
  } = options;

  if (updateStrip) {
    setActiveStripDay(target.dateString);
  }

  pulseActivePill(target.dateString, pulse);

  animateScrollTo(target.targetY, {
    duration: preset.duration,
    easing: preset.easing,
    onComplete: () => {
      window.setTimeout(() => {
        focusDaySection(target.el, focus);
      }, preset.focusDelay);
    }
  });
}

function syncStripToScroll() {
  const daySections = Array.from(document.querySelectorAll(".day-section"));
  if (!daySections.length) return;

  let closest = daySections[0];
  let closestDistance = Infinity;

  daySections.forEach((section) => {
    const rect = section.getBoundingClientRect();
    const distance = Math.abs(rect.top - getTopOffset());    if (distance < closestDistance) {
      closest = section;
      closestDistance = distance;
    }
  });

  const activeDate = closest.id.replace("day-", "");
  setActiveStripDay(activeDate);
}

/* =========================
   BUILD TIMELINE
========================= */

function buildTimeline(){
  timelineEl.innerHTML = "";

  for(let i=-7;i<21;i++){
    const d = new Date(baseDate);
    d.setDate(baseDate.getDate()+i);

    const dayLabel = d.toDateString();

    const shopAppointments = [
      {
        time: "12:00 PM",
        client: "Miss Mary",
        artist: "Jake",
        projectUrl: "/operator/projects.html?project=miss-mary-1"
      },
      {
        time: "12:00 PM",
        client: "John D.",
        artist: "Lena",
        projectUrl: "/operator/projects.html?project=john-d-1"
      },
      {
        time: "2:30 PM",
        client: "Sarah K.",
        artist: "Jake",
        projectUrl: "/operator/projects.html?project=sarah-k-1"
      }
    ];

    const islaActions = [
      {
        time: "12:00 PM",
        type: "CareWatch",
        client: "Miss Mary",
        detail: "Healing check-in scheduled",
        projectUrl: "/operator/projects.html?project=miss-mary-1"
      },
      {
        time: "2:30 PM",
        type: "Review",
        client: "Sarah K.",
        detail: "Review request queued",
        projectUrl: "/operator/projects.html?project=sarah-k-1"
      }
    ];

    let renderedAppointments = shopAppointments;
    let renderedIsla = [];

    if (currentLens === "artist") {
      renderedAppointments = shopAppointments.filter((item) => item.artist === currentArtist);
    }

    if (currentLens === "isla") {
      renderedAppointments = shopAppointments;
      renderedIsla = islaActions;
    }

    const timelineItems = [];

    renderedAppointments.forEach((item) => {
      timelineItems.push({
        kind: "appointment",
        time: item.time,
        projectUrl: item.projectUrl,
        artist: item.artist,
        client: item.client,
        ghost: currentLens === "isla"
      });
    });

    renderedIsla.forEach((item) => {
      timelineItems.push({
        kind: "isla",
        time: item.time,
        projectUrl: item.projectUrl,
        type: item.type,
        client: item.client,
        detail: item.detail
      });
    });

    const timeOrder = {
      "12:00 PM": 1200,
      "2:30 PM": 1430,
      "4:00 PM": 1600,
      "6:00 PM": 1800
    };

    timelineItems.sort((a, b) => {
      const aTime = timeOrder[a.time] || 9999;
      const bTime = timeOrder[b.time] || 9999;
      return aTime - bTime;
    });

    const groupedByTime = new Map();
    timelineItems.forEach((item) => {
      if (!groupedByTime.has(item.time)) groupedByTime.set(item.time, []);
      groupedByTime.get(item.time).push(item);
    });

    const slotMarkup = timelineItems.length
      ? Array.from(groupedByTime.entries()).map(([time, items]) => {
          const inner = items.map((item) => {
            if (item.kind === "appointment") {
              const islaGhostClass = item.ghost ? " appt-ghost" : "";
              return `
                <div class="appt${islaGhostClass}" data-project-url="${item.projectUrl}">
                  <div class="appt-time">${item.time}</div>
                  <div class="appt-client">${item.client}</div>
                  <div class="appt-artist">${item.artist}</div>
                </div>
              `;
            }

            return `
              <div class="isla" data-project-url="${item.projectUrl}">
                <div class="isla-type">${item.type}</div>
                <div class="isla-client">${item.client}</div>
                <div class="isla-detail">${item.detail}</div>
              </div>
            `;
          }).join("");

          return `
            <div class="time-slot">
              <div class="slot-time">${time}</div>
              <div class="slot-stack">${inner}</div>
            </div>
          `;
        }).join("")
      : `<div class="time-slot"><div class="slot-time">—</div><div class="slot-stack"><div class="appt" style="opacity:.6;">No activity this day</div></div></div>`;

    const section = document.createElement("div");
    section.className = "day-section";
    section.id = "day-"+dayLabel;

    section.innerHTML = `
      <div class="day-header">${dayLabel}</div>
      ${slotMarkup}
    `;

    timelineEl.appendChild(section);
  }

  wireProjectLinks();
}

function setLens(lens, event){
  currentLens = lens;

  document.querySelectorAll(".lens-btn").forEach((btn) => {
    btn.classList.remove("active");
  });

  if (event?.currentTarget) {
    event.currentTarget.classList.add("active");
  } else {
    const btn = document.querySelector(`.lens-btn[data-lens="${lens}"]`);
    if (btn) btn.classList.add("active");
  }

  syncArtistFilterVisibility();
    buildWeekStrip();
    buildTimeline();
    syncStripToScroll();
}

function syncArtistFilterVisibility() {
  if (!artistFilterRowEl) return;

  if (currentLens === "artist") {
    artistFilterRowEl.classList.add("is-visible");
    if (artistSelectEl) artistSelectEl.value = currentArtist;
  } else {
    artistFilterRowEl.classList.remove("is-visible");
  }
}

function setArtist(artist) {
  currentArtist = artist;
  buildWeekStrip();
  buildTimeline();
  syncStripToScroll();
}

function wireProjectLinks() {
  const items = document.querySelectorAll(".appt[data-project-url], .isla[data-project-url]");

  items.forEach((item) => {
    item.style.cursor = "pointer";
    item.addEventListener("click", () => {
      const url = item.getAttribute("data-project-url");
      if (url) {
        window.location.href = url;
      }
    });
  });
}
/* =========================
   NAVIGATION
========================= */

function scrollToDate(date){
  navigateToDate(date, "tap", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}

function scrollToDay(type){
  if(type !== "today") return;

  const isAlreadyToday = baseDate.toDateString() === today.toDateString();

  if (isAlreadyToday) {
    navigateToDate(today, "today", {
      updateStrip: true,
      pulse: false,
      focus: true
    });
    return;
  }

  baseDate = new Date(today);
  buildWeekStrip();
  buildTimeline();

  window.requestAnimationFrame(() => {
    navigateToDate(baseDate, "today", {
      updateStrip: true,
      pulse: false,
      focus: true
    });
  });
}

function scrollToWeek(offset){
  const next = new Date(baseDate);
  next.setDate(baseDate.getDate() + (offset * 7));
  baseDate = next;

  buildWeekStrip();
  buildTimeline();

  window.requestAnimationFrame(() => {
    navigateToDate(baseDate, "week", {
      updateStrip: true,
      pulse: true,
      focus: true
    });
  });
}

function scrollToMonth(offset){
  const next = new Date(baseDate);
  next.setMonth(baseDate.getMonth() + offset);
  baseDate = next;

  buildWeekStrip();
  buildTimeline();

  window.requestAnimationFrame(() => {
    navigateToDate(baseDate, "month", {
      updateStrip: true,
      pulse: true,
      focus: true
    });
  });
}


window.addEventListener("scroll", () => {
  if (isProgrammaticScroll || scrollSyncTicking) return;
  scrollSyncTicking = true;
  window.requestAnimationFrame(() => {
    syncStripToScroll();
    scrollSyncTicking = false;
  });
});

/* =========================
   INIT
========================= */

const backTopBtn = document.getElementById("back-to-top");
if(backTopBtn){
  backTopBtn.addEventListener("click", () => {
    animateScrollTo(0, {
      duration: 260,
      easing: "easeOutCubic",
      onComplete: () => {
        syncStripToScroll();
      }
    });
  });
}

syncArtistFilterVisibility();
buildWeekStrip();
buildTimeline();
syncStripToScroll();
</script>
</body>
</html>
