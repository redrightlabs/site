<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar · RedRight</title>

<style>
:root{
  --bg:#07080b;
  --panel:#0f1217;
  --text:#efe8df;
  --muted:#a0a9b5;
  --line:rgba(255,255,255,.08);
  --accent:#ff4d4d;
  --radius:18px;
  --sans:"Cormorant Garamond", Garamond, Georgia, serif;
  --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Garamond, Georgia, serif;
  --hero:"Cormorant Garamond", Garamond, Georgia, serif;
  --project-sticky-offset: 198px;
}

body{
  margin:0;
  background:linear-gradient(#06070a,#090b0f);
  color:var(--text);
  font-family:var(--serif);
}

  .shell{
    max-width:540px;
    margin:0 auto;
    padding:16px;
  }


.top-nav{
  position:sticky;
  top:0;
  z-index:20;
  padding:8px 0 10px;
  background:linear-gradient(rgba(6,7,10,.96),rgba(9,11,15,.92));
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.04);
}

  .business-identity{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
    opacity:.82;
    text-align:center;
  }

.up-next-bar{
  margin:8px 0 0;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.up-next-label{
  color:rgba(255,255,255,.5);
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.up-next-value{
  font-weight:600;
  color:#f5eee6;
}
.back-top{
  position:fixed;
  right:16px;
  bottom:20px;
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  opacity:0;
  transform:translateY(8px);
  pointer-events:none;
  transition:opacity .18s ease, transform .18s ease, background .12s ease;
}
.back-top:hover{
  background:rgba(255,255,255,.08);
}

.back-top.is-visible{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* =========================
   JUMP CONTROLS
========================= */

.jump-row{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.jump-btn{
  padding:7px 11px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.045);
  background:rgba(255,255,255,.018);
  color:rgba(233,232,223,.72);
  font-size:12px;
  cursor:pointer;
}

.jump-btn.is-today{
  border-color:rgba(255,77,77,.16);
  background:rgba(255,77,77,.08);
  color:rgba(255,245,245,.92);
  box-shadow:0 0 0 1px rgba(255,77,77,.04) inset;
}

/* =========================
   WEEK STRIP
========================= */

.week-strip{
  display:flex;
  justify-content:space-between;
  gap:4px;
  margin-bottom:8px;
}

.day-pill{
  flex:1;
  text-align:center;
  padding:7px 0 6px;
  border-radius:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
  border:1px solid transparent;
}

.day-pill.active{
  color:#fff;
  background:rgba(255,77,77,.10);
  border-color:rgba(255,77,77,.14);
}

.day-pill:hover{
  color:#fff;
  background:rgba(255,255,255,.05);
}

  .day-dot{
    margin-top:4px;
    min-height:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:700;
    line-height:1;
    color:rgba(233,232,223,.82);
  }
  .day-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:16px;
  height:16px;
  padding:0 5px;
  border-radius:999px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.06);
  font-size:10px;
}

/* =========================
   TIMELINE
========================= */

/* Destination focus */
.day-section.is-focused{
  outline:1px solid rgba(255,77,77,.28);
  box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35);
  animation:dayFocusFade 520ms ease-out;
}

@keyframes dayFocusFade{
  0%{ box-shadow:0 0 0 2px rgba(255,77,77,.35) inset, 0 16px 36px rgba(0,0,0,.45); }
  100%{ box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35); }
}

/* Week pill pulse */
.day-pill.pulse{
  animation:pillPulse 380ms ease-out;
}

@keyframes pillPulse{
  0%{ transform:scale(1); background:rgba(255,77,77,.12); }
  40%{ transform:scale(1.06); background:rgba(255,77,77,.18); }
  100%{ transform:scale(1); background:rgba(255,77,77,.12); }
}



.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}


.day-section{
  padding:12px 10px 10px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--panel);
}
.day-section.is-today{
  border-color:rgba(255,77,77,.22);
  box-shadow:0 0 0 1px rgba(255,77,77,.08) inset, 0 14px 34px rgba(0,0,0,.45);
}
.day-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--muted);
}

.day-header .title{
  color:var(--text);
}

.badge-today{
  font-size:10px;
  padding:3px 6px;
  border-radius:999px;
  background:rgba(255,77,77,.14);
  color:#ffdede;
  border:1px solid rgba(255,77,77,.25);
}
  .time-slot{
    display:grid;
    grid-template-columns:56px 1fr;
    gap:8px;
    align-items:start;
    margin-bottom:8px;
  }

  .time-slot:last-child{
    margin-bottom:0;
  }

  .slot-time{
    padding-top:8px;
    color:rgba(233,232,223,.62);
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
    white-space:nowrap;
  }

  .slot-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
  }


  /* === NOW / NEXT UP Awareness Layer === */
  .now-marker{
    position:relative;
    margin:6px 0;
    height:0;
  }
  .now-marker::before{
    content:"";
    position:absolute;
    left:56px; /* aligns with content column after time */
    right:0;
    top:-1px;
    border-top:1px dashed rgba(255,77,77,.45);
  }
  .now-chip{
    position:absolute;
    left:0;
    top:-8px;
    font-size:10px;
    padding:2px 6px;
    border-radius:999px;
    background:rgba(255,77,77,.14);
    color:#ffdede;
    border:1px solid rgba(255,77,77,.25);
  }
  .is-next{
  border-color:rgba(255,77,77,.35) !important;
  box-shadow:0 0 0 1px rgba(255,77,77,.12) inset, 0 8px 24px rgba(0,0,0,.24);
}

.is-current{
  border-color:rgba(255,77,77,.45) !important;
  box-shadow:0 0 0 1px rgba(255,77,77,.18) inset, 0 10px 28px rgba(0,0,0,.32);
}

.current-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#fff;
  background:rgba(255,77,77,.28);
  border:1px solid rgba(255,77,77,.38);
  white-space:nowrap;
}

.next-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#ffdede;
  background:rgba(255,77,77,.14);
  border:1px solid rgba(255,77,77,.24);
  white-space:nowrap;
}
  .is-past{
    opacity:.55;
  }

  .home-row{
    display:flex;
    justify-content:flex-start;
    margin-bottom:8px;
  }



.home-btn{
  position:absolute;
  left:0;
  top:0;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.015);
  color:rgba(233,232,223,.58);
  font-size:12px;
  cursor:pointer;
}

.home-btn:hover{
  background:rgba(255,255,255,.035);
  color:rgba(244,237,228,.92);
}

.lens-row{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:0 auto;
}

.lens-btn{
  padding:7px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.045);
  background:rgba(255,255,255,.015);
  color:rgba(233,232,223,.58);
  font-size:12px;
  cursor:pointer;
}

.lens-btn.active{
  color:#fff;
  background:rgba(255,77,77,.10);
  border-color:rgba(255,77,77,.16);
  box-shadow:0 0 0 1px rgba(255,77,77,.05) inset;
}
  .artist-filter-row{
    display:none;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:2px 0 4px;
  }

.artist-filter-row.is-visible{
  display:flex;
}
.artist-filter-label{
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(233,232,223,.48);
  white-space:nowrap;
}
  .artist-select{
    min-width:156px;
    padding:7px 12px;
    border-radius:11px;
    border:1px solid rgba(255,255,255,.05);
    background:rgba(255,255,255,.02);
    color:var(--text);
    font-size:12px;
    font-family:var(--serif);
    text-align:center;
    text-align-last:center;
  }
.appt-ghost{
  opacity:.45;
}
/* =========================
   APPOINTMENTS
========================= */

  .appt{
    padding:8px 10px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .appt:last-child{
    margin-bottom:0;
  }

.empty-state{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.025);
  border:1px dashed rgba(255,255,255,.06);
}

.empty-title{
  font-size:12px;
  font-weight:600;
  color:rgba(255,255,255,.6);
}

.empty-sub{
  display:inline;
  font-size:12px;
  color:rgba(255,255,255,.4);
  margin-left:6px;
}

  .appt-client{
    flex:0 1 auto;
    min-width:0;
    color:var(--text);
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .appt-type{
  flex:1 1 auto;
  min-width:0;
  margin-left:6px;
  color:rgba(233,232,223,.58);
  font-size:11px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.appt-artist{
  flex:0 0 auto;
  color:rgba(233,232,223,.45);
  font-size:11px;
  white-space:nowrap;
}
.appt-type-row{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1 1 auto;
}

.rr-buoy{
  position:relative;
  flex:0 0 auto;
  width:10px;
  height:10px;
  border-radius:999px;
  opacity:0;
  transform:scale(.92);
  transition:opacity .18s ease, transform .18s ease;
}

.rr-buoy::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:999px;
  background:radial-gradient(circle at 50% 50%, rgba(255,244,244,.96) 0%, rgba(255,112,112,.92) 26%, rgba(255,77,77,.78) 44%, rgba(123,12,12,.94) 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06) inset,
    0 0 8px rgba(255,77,77,.22),
    0 0 18px rgba(255,77,77,.14);
}

.rr-buoy.is-visible{
  opacity:1;
  transform:scale(1);
}

.rr-buoy.is-escalated::before{
  animation:rrBuoyPulse 2.4s ease-in-out infinite;
}

.rr-buoy.is-blocked::before{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 0 5px rgba(255,77,77,.14),
    0 0 10px rgba(255,77,77,.08);
  opacity:.88;
}

@keyframes rrBuoyPulse{
  0%{
    box-shadow:
      0 0 0 1px rgba(255,255,255,.06) inset,
      0 0 6px rgba(255,77,77,.22),
      0 0 12px rgba(255,77,77,.10);
    transform:scale(1);
  }
  68%{
    box-shadow:
      0 0 0 1px rgba(255,255,255,.08) inset,
      0 0 12px rgba(255,77,77,.46),
      0 0 24px rgba(255,77,77,.22);
    transform:scale(1.04);
  }
  100%{
    box-shadow:
      0 0 0 1px rgba(255,255,255,.06) inset,
      0 0 6px rgba(255,77,77,.22),
      0 0 12px rgba(255,77,77,.10);
    transform:scale(1);
  }
}
.appt,
.isla{
  transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}

.appt:hover,
.isla:hover{
  transform:translateY(-1px);
}

.appt:active,
.isla:active{
  transform:scale(.99);
}
/* =========================
   ISLA BLOCKS
========================= */

.isla{
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,77,77,.10);
  border:1px solid rgba(255,77,77,.22);
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.isla.isla-blocked{
  opacity:.72;
  border-style:dashed;
}
.isla.isla-pending{
  background:rgba(255,77,77,.10);
  border-color:rgba(255,77,77,.22);
}
.isla.isla-sent,
.isla.isla-completed{
  background:rgba(255,255,255,.045);
  border-color:rgba(255,255,255,.10);
}
.isla.isla-cancelled{
  opacity:.45;
  background:rgba(255,255,255,.025);
  border-color:rgba(255,255,255,.06);
  text-decoration:line-through;
}
.isla-type{
  flex:0 0 auto;
  font-weight:600;
  color:#ffdede;
  white-space:nowrap;
}

.isla-client{
  flex:1 1 auto;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:rgba(233,232,223,.82);
}

.isla-detail{
  flex:0 0 auto;
  color:rgba(233,232,223,.5);
  font-size:11px;
  white-space:nowrap;
}
/* =========================
   PROJECT DRAWER
========================= */
.project-drawer-overlay{
  position:fixed;
  inset:0;
  background:rgba(5,6,8,.52);
  backdrop-filter:blur(8px);
  z-index:70;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
}

.project-drawer-overlay.is-open{
  opacity:1;
  pointer-events:auto;
}

  .project-drawer{
    position:fixed;
    top:0;
    right:0;
    width:min(100vw, 520px);
  height:100vh;
  background:
    radial-gradient(120% 140% at 50% 0%, rgba(255,77,77,.08), transparent 42%),
    linear-gradient(180deg, rgba(17,19,23,.98), rgba(13,15,19,.99));
  border-left:1px solid rgba(255,255,255,.08);
  box-shadow:
    -22px 0 56px rgba(0,0,0,.48),
    0 0 32px rgba(255,77,77,.06),
    inset 0 1px 0 rgba(255,255,255,.04);
  transform:translateX(100%);
  transition:transform .22s ease;
  display:flex;
  flex-direction:column;
}

.project-drawer-overlay.is-open .project-drawer{
  transform:translateX(0);
}

.project-drawer-head{
  position:sticky;
  top:0;
  z-index:2;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  padding:10px 18px 7px;
  background:linear-gradient(rgba(17,19,23,.98), rgba(13,15,19,.94));
  border-bottom:1px solid rgba(255,255,255,.06);
}

.project-drawer-topline{
  margin:0 0 2px;
  color:rgba(233,232,223,.42);
  font-family:var(--sans);
  font-size:8px;
  font-weight:700;
  letter-spacing:.10em;
  text-transform:uppercase;
}

.project-drawer-title{
  margin:0;
  color:rgba(255,255,255,.96);
  font-family:var(--hero);
  font-size:17px;
  font-weight:700;
  line-height:1.06;
  letter-spacing:-.01em;
}

.project-drawer-title-row{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
}

.project-drawer-artist{
  flex:0 0 auto;
  text-align:right;
  color:rgba(233,232,223,.42);
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  letter-spacing:.01em;
  line-height:1.1;
  white-space:nowrap;
}

.project-drawer-close{
  flex:0 0 auto;
  width:40px;
  height:40px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
}

.project-drawer-close:hover{
  background:rgba(255,255,255,.06);
}

.project-drawer-body{
  flex:1 1 auto;
  overflow-y:auto;
  padding:14px 18px 22px;
  scrollbar-width:none;
  position:relative;
}

.project-drawer-body::-webkit-scrollbar{
  display:none;
}

.project-drawer-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

/* Removed duplicate project-drawer-topstack, project-context-shell, project-context-card, project-context-kicker, project-context-title, project-context-copy, project-pulse-row, project-pulse-chip, project-pulse-chip.is-healthy, project-pulse-chip.is-warn, project-pulse-chip.is-calm, project-mini-grid, project-mini-card, project-mini-label, project-mini-value, project-nav, project-nav::-webkit-scrollbar, project-nav-btn, project-nav-btn.is-active, project-panel, project-panel.is-active, project-callout, project-callout.is-alert, project-callout-title, project-callout-copy */

.project-context-hero{
  display:grid;
  grid-template-columns:78px 1fr;
  gap:8px;
  align-items:stretch;
}

.project-context-image{
  min-height:76px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.065);
  background:
    radial-gradient(120% 120% at 50% 0%, rgba(255,77,77,.08), transparent 44%),
    rgba(255,255,255,.03);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.project-context-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.project-context-image-empty{
  padding:12px;
  text-align:center;
  color:rgba(233,232,223,.52);
  font-family:var(--sans);
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  line-height:1.4;
}

.project-state-strip{
  display:flex;
  justify-content:flex-end;
  flex-wrap:wrap;
  gap:5px;
  margin-top:6px;
}

.project-state-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 7px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  color:rgba(255,255,255,.78);
  font-family:var(--sans);
  font-size:9px;
  font-weight:600;
  letter-spacing:.05em;
  text-transform:uppercase;
}

.project-state-chip.is-alert{
  border-color:rgba(255,77,77,.18);
  background:rgba(255,77,77,.10);
  color:#ffe3e3;
}

.project-spotlight{
  padding:6px 9px;
  border-radius:11px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.028);
}

.project-spotlight.is-alert{
  border-color:rgba(255,77,77,.20);
  background:rgba(255,77,77,.08);
}

.project-spotlight-title{
  margin:0;
  color:rgba(255,255,255,.95);
  font-family:var(--sans);
  font-size:10px;
  font-weight:700;
}

.project-spotlight-copy{
  margin:2px 0 0;
  color:rgba(233,232,223,.62);
  font-size:10px;
  line-height:1.28;
}

.project-drawer-topstack{

function normalizeDateKey(value){
  const d = new Date(value);
  return Number.isNaN(d.getTime()) ? null : d.toDateString();
}

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function normalizeTimeLabel(value){
  if (!value) return "12:00 PM";
  if (typeof value !== "string") return String(value);

  const trimmed = value.trim();
  if (/AM|PM/i.test(trimmed)) return trimmed.toUpperCase();

  const [rawH, rawM = "00"] = trimmed.split(":");
  let hours = Number(rawH);
  const minutes = String(rawM).padStart(2, "0");
  if (Number.isNaN(hours)) return trimmed;

  const suffix = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  if (hours === 0) hours = 12;
  return `${hours}:${minutes} ${suffix}`;
}

function normalizeAppointment(record){
  const dateKey = normalizeDateKey(record.date || record.start || record.startsAt);
  if (!dateKey) return null;

  return {
    id: record.id || `${dateKey}-${record.time || record.startTime || record.clientName || record.client || "appt"}`,
    date: dateKey,
    time: normalizeTimeLabel(record.time || record.startTime || record.start || record.startsAt),
    client: record.client || record.clientName || "Client",
    artist: record.artist || record.artistName || record.provider || record.providerName || "Provider",
    type: record.type || record.serviceType || record.sessionLabel || "Appointment",
    projectUrl: record.projectUrl || (record.projectId ? `/operator/projects.html?project=${record.projectId}` : "")
  };
}

function normalizeLifecycleEvent(record){
  const dateKey = normalizeDateKey(record.date || record.dueDate || record.when);
  if (!dateKey) return null;

  return {
    id: record.id || `${dateKey}-${record.type || "event"}-${record.client || record.clientName || "client"}`,
    date: dateKey,

}

function formatDateTime(value){

  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "Unknown time";
  return date.toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function getProjectPulse(data){
  const appointments = data?.appointments || [];
  const completion = data?.completion || [];
  const lifecycle = data?.lifecycle || [];
  const detail = data?.folderDetail || null;

  const blockingCompletion = completion.filter((row) => {
    const status = String(row.status || "").toLowerCase();
    return status === "blocked_missing_contact" || status === "escalated";
  });

  const sortedAppointments = appointments
    .slice()
    .sort((a, b) => new Date(a.start_time).getTime() - new Date(b.start_time).getTime());

  const latestAppointment = sortedAppointments.length
    ? sortedAppointments[sortedAppointments.length - 1]
    : null;

  const nextAppointment = sortedAppointments.find((row) => new Date(row.start_time).getTime() >= Date.now()) || latestAppointment || null;

  const nextLifecycle = lifecycle
    .filter((row) => String(row.status || "pending").toLowerCase() === "pending")
    .sort((a, b) => new Date(a.due_at).getTime() - new Date(b.due_at).getTime())[0] || null;

  const completedAppointment = sortedAppointments
    .slice()
    .reverse()
    .find((row) => String(row.status || "").toLowerCase() === "done") || null;

  if (blockingCompletion.length) {
    return {
      tone: "alert",
      stateLabel: "Needs intervention",
      summary: detail?.service_summary || "Project",
      subcopy: blockingCompletion.length === 1 ? "One checkpoint is stuck." : `${blockingCompletion.length} checkpoints are stuck.`,
      spotlightTitle: "Intervention required",
      spotlightCopy: "Something is blocked and Isla needs human help to continue cleanly.",
      nextAction: "Unblock the completion path.",
      currentPart: latestAppointment?.service_type || "No session breakdown yet",
      nextAppointment,
      nextLifecycle,
      completedAppointment
    };
  }

  if (completedAppointment && nextLifecycle) {
    return {
      tone: "calm",
      stateLabel: "Aftercare active",
      summary: detail?.service_summary || "Project",
      subcopy: "The appointment happened. Isla is handling the follow-up.",
      spotlightTitle: "Aftercare is in motion",
      spotlightCopy: `Next touch: ${humanizeLifecycleType(nextLifecycle.type)}.`,
      nextAction: `Next: ${humanizeLifecycleType(nextLifecycle.type)}.`,
      currentPart: completedAppointment.service_type || "Completed session",
      nextAppointment,
      nextLifecycle,
      completedAppointment
    };
  }

  if (nextAppointment) {
    return {
      tone: "calm",
      stateLabel: "On course",
      summary: detail?.service_summary || "Project",
      subcopy: "Project context is ready when you need it.",
      spotlightTitle: "Current context",
      spotlightCopy: `${nextAppointment.service_type || "Session"} · ${formatDateTime(nextAppointment.start_time)}`,
      nextAction: nextLifecycle ? `Next: ${humanizeLifecycleType(nextLifecycle.type)}.` : "No urgent action.",
      currentPart: nextAppointment.service_type || "No session breakdown yet",
      nextAppointment,
      nextLifecycle,
      completedAppointment
    };
  }

  return {
    tone: "calm",
    stateLabel: "Quiet",
    summary: detail?.service_summary || "Project",
    subcopy: "Nothing urgent is surfacing.",
    spotlightTitle: "Quiet waters",
    spotlightCopy: "This project looks calm right now.",
    nextAction: "No intervention needed.",
    currentPart: latestAppointment?.service_type || "No session breakdown yet",
    nextAppointment: latestAppointment,
    nextLifecycle,
    completedAppointment
  };
}

function getProjectHeroMedia(detail, media, pulse){

  const healing = (media || []).find((item) => item.media_type === "healing_issue" && (item.display_path || item.preview_path || item.storage_path));
  const reference = (media || []).find((item) => item.media_type === "reference" && (item.display_path || item.preview_path || item.storage_path));

function getWorkbookStorageKey(projectId){

function loadWorkbookDraft(projectId){

}

function wireWorkbookInputs(projectId){
  const notesEl = document.getElementById("project-workbook-notes");
  const reminderEl = document.getElementById("project-workbook-reminder");
  const filesEl = document.getElementById("project-workbook-files");
  const photosEl = document.getElementById("project-workbook-photos");

  if (notesEl) {
    notesEl.addEventListener("input", (event) => {
      saveWorkbookDraft(projectId, "notes", event.target.value);
    });
  }

  if (reminderEl) {
    reminderEl.addEventListener("input", (event) => {
      saveWorkbookDraft(projectId, "reminder", event.target.value);
    });
  }

  if (filesEl && photosEl) {
    filesEl.addEventListener("change", (event) => {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;

      const uploads = getWorkbookUploads(projectId);
      files.forEach((file) => {
        uploads.unshift({
          name: file.name,
          url: URL.createObjectURL(file)
        });
      });

      photosEl.innerHTML = renderWorkbookUploads(projectId);
      event.target.value = "";
    });
  }
}

  return `

        const status = String(item.status || item.delivery_status || item.event_status || "sent");

        const title = item.template_name
          || item.message_type
          || item.event_type
          || (direction === "inbound" ? "Client message" : "Isla message");

        const body = item.message_body
          || item.body
          || item.text
          || item.message_text
          || item.preview_text
          || item.event_detail
          || item.detail
          || "No message preview available.";

        const metaParts = [];
        if (channel) metaParts.push(channel);
        if (sentAt) metaParts.push(formatDateTime(sentAt));
        if (status) metaParts.push(status);

        return `
          <div class="project-row">
            <div class="project-row-top">
              <p class="project-row-title">${escapeHtml(title)}</p>
              <span class="project-status-chip">${escapeHtml(direction === "inbound" ? "Inbound" : "Sent")}</span>
            </div>
            <p class="project-row-meta">${escapeHtml(metaParts.join(" · "))}</p>
            <p class="project-row-sub">${escapeHtml(body)}</p>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

async function loadCalendarData(){
  try {
    const shopId = getResolvedShopId();
    setActiveShopId(shopId);

    // 1. Shop identity
    const { data: shopRow, error: shopError } = await supabaseClient
      .from("shops")
      .select("id, name, vertical, timezone")
      .eq("id", shopId)
      .single();

    if (shopError) throw shopError;

    // 2. Projects for this shop
    const { data: projectsRaw, error: projError } = await supabaseClient
      .from("projects")
      .select("id, shop_id, client_id, primary_artist_id, vertical, status")
      .eq("shop_id", shopId);

    if (projError) throw projError;

    const projectIds = (projectsRaw || []).map((p) => p.id);
    const clientIds = [...new Set((projectsRaw || []).map((p) => p.client_id).filter(Boolean))];
    const artistIds = [...new Set((projectsRaw || []).map((p) => p.primary_artist_id).filter(Boolean))];

    // 3. Appointments for this shop
    const { data: appointmentsRaw, error: apptError } = await supabaseClient
      .from("appointments")
      .select("*")
      .eq("shop_id", shopId);

    if (apptError) throw apptError;
    const appointmentIds = (appointmentsRaw || []).map((a) => a.id).filter(Boolean);
    activeAppointmentIds = new Set(appointmentIds);

    // 4. Lifecycle events for this shop's appointments
    let lifecycleRaw = [];
    if (appointmentIds.length) {
      const lifeRes = await supabaseClient
        .from("lifecycle_events")
        .select("id, project_id, appointment_id, type, due_at, status, is_blocked, created_at")
        .in("appointment_id", appointmentIds);

      if (lifeRes.error) throw lifeRes.error;
      lifecycleRaw = lifeRes.data || [];
    }

    // 5. Completion attention queue for this shop
    let completionAttentionRaw = [];
    const completionRes = await supabaseClient.rpc("get_completion_attention_queue");

    if (completionRes.error) throw completionRes.error;

    completionAttentionRaw = (completionRes.data || []).filter(
      (row) => row.shop_id === shopId
    );

        // 6. Related clients
    let clientsRaw = [];
    if (clientIds.length) {
      const clientRes = await supabaseClient
        .from("clients")
        .select("id, name, phone, email")
        .in("id", clientIds);

      if (clientRes.error) throw clientRes.error;
      clientsRaw = clientRes.data || [];
    }

    // 6. Load full shop roster (not just project-linked artists)
    let rosterRaw = [];
    const rosterRes = await supabaseClient
      .from("shop_roster")
      .select("id, name, role")
      .eq("shop_id", shopId);

    if (rosterRes.error) throw rosterRes.error;
    rosterRaw = rosterRes.data || [];
    CALENDAR_STATE.roster = rosterRaw || [];

    const projectMap = new Map((projectsRaw || []).map((p) => [p.id, p]));
    const clientMap = new Map((clientsRaw || []).map((c) => [c.id, c]));
    const rosterMap = new Map((rosterRaw || []).map((r) => [r.id, r]));
    const appointmentMap = new Map((appointmentsRaw || []).map((a) => [a.id, a]));

        const completionAttentionMap = new Map(
      (completionAttentionRaw || []).map((row) => [row.appointment_id, row])
    );

    CALENDAR_STATE.appointments = (appointmentsRaw || []).map((a) => {
      const attention = completionAttentionMap.get(a.id);
      return {
        id: a.id,
        date: new Date(a.start_time).toDateString(),
        time: normalizeTimeLabel(new Date(a.start_time).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })),
        client: a.client_name,
        artist: a.artist_name,
        type: a.service_type || "Appointment",
               status: a.status || "scheduled",
        completionStatus: attention?.completion_status || "",
        hereSignalPresent: !!attention?.here_signal_present,
        projectId: a.project_id,
        projectUrl: `/operator/projects.html?project=${a.project_id}`
     };
    });

    CALENDAR_STATE.lifecycleEvents = (lifecycleRaw || []).map((e) => {
      const project = projectMap.get(e.project_id);
      const appointment = appointmentMap.get(e.appointment_id);
      const client = project ? clientMap.get(project.client_id) : null;
      const artist = project ? rosterMap.get(project.primary_artist_id) : null;

      return {
        id: e.id,
        date: new Date(e.due_at).toDateString(),
        time: normalizeTimeLabel(
          new Date(e.due_at).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
        ),
        type: mapLifecycleTypeLabel(e.type),
        rawType: e.type,
        client: client?.name || appointment?.client_name || "Client",
        artist: artist?.name || appointment?.artist_name || "",
        projectContext: appointment?.service_type || (project?.vertical ? `${project.vertical} project` : "Project"),
        detail: mapLifecycleDetail(e.type),
        projectUrl: `/operator/projects.html?project=${e.project_id}`,
        status: e.status || "pending",
        isBlocked: !!e.is_blocked
      };
    });

CALENDAR_STATE.completionAttention = (completionAttentionRaw || []).map((row) => ({
  appointmentId: row.appointment_id,
  shopId: row.shop_id,
  clientName: row.client_name,
  artistName: row.artist_name,
  appointmentStatus: row.appointment_status,
  completionStatus: row.completion_status,
  startTime: row.start_time,
  endTime: row.end_time,
  initialPromptSentAt: row.initial_prompt_sent_at,
  nudgeSentAt: row.nudge_sent_at,
  escalationSentAt: row.escalation_sent_at,
  resolvedAt: row.resolved_at,
  hereSignalPresent: !!row.here_signal_present,
  founderAttentionRequired: !!row.founder_attention_required
}));

    CALENDAR_STATE.projects = projectsRaw || [];
    CALENDAR_STATE.businessProfile = {
      name: shopRow?.name || BUSINESS_PROFILE.name,
      vertical: shopRow?.vertical || BUSINESS_PROFILE.vertical,
      timezone: shopRow?.timezone || null
    };
const availableArtistNames = [...new Set([
  ...(CALENDAR_STATE.roster || []).map((member) => member.name).filter(Boolean),
  ...(CALENDAR_STATE.appointments || []).map((item) => item.artist).filter(Boolean)
])];

if (!currentArtist || !availableArtistNames.includes(currentArtist)) {
  currentArtist = availableArtistNames[0] || "";
}
    CALENDAR_STATE.loaded = true;
  } catch (error) {
    console.error("Supabase load failed:", error);
    activeAppointmentIds = new Set();
    CALENDAR_STATE.loaded = false;
  }
}

function getFallbackIslaActionsForDate(date){
  const targetDayKey = date.toDateString();
  const actions = [];

  function addLifecycleAction(appt, actionDate, actionType, detail){
    if (actionDate.toDateString() !== targetDayKey) return;

    actions.push({
      date: targetDayKey,
      time: appt.time,
      type: actionType,
      client: appt.client,
      artist: appt.artist,
      projectContext: appt.type || "Project",
      detail,
      projectUrl: appt.projectUrl
    });
  }

  for (let offset = 0; offset <= 30; offset++) {
    const sourceDate = new Date(date);
    sourceDate.setDate(date.getDate() - offset);

    const sourceAppointments = getFallbackShopAppointmentsForDate(sourceDate);

    sourceAppointments.forEach((appt) => {
      const type = (appt.type || "").toLowerCase();

      if (type.includes("consult")) {
        const followupDate = new Date(sourceDate);
        followupDate.setDate(sourceDate.getDate() + 1);
        addLifecycleAction(appt, followupDate, "Follow-up", "Consult follow-up due");
      }

      if (type.includes("session") || type.includes("tattoo")) {
        const careWatchDate = new Date(sourceDate);
        careWatchDate.setDate(sourceDate.getDate() + 3);
        addLifecycleAction(appt, careWatchDate, "CareWatch", "Healing check-in due");

        const reviewDate = new Date(sourceDate);
        reviewDate.setDate(sourceDate.getDate() + 21);
        addLifecycleAction(appt, reviewDate, "Review", "Review request window open");
      }

      if (type.includes("facial") || type.includes("botox") || type.includes("laser")) {
        const outcomeDate = new Date(sourceDate);
        outcomeDate.setDate(sourceDate.getDate() + 2);
        addLifecycleAction(appt, outcomeDate, "Follow-up", "Outcome check-in due");

        const reviewDate = new Date(sourceDate);
        reviewDate.setDate(sourceDate.getDate() + 14);
        addLifecycleAction(appt, reviewDate, "Review", "Review request window open");
      }
    });
  }

  actions.sort((a, b) => parseMinutes(a.time) - parseMinutes(b.time));
  return actions.slice(0, Math.min(actions.length, 6));
}

function buildWeekStrip(){
  stripEl.innerHTML = "";

  for(let i=0;i<7;i++){
    const d = new Date(baseDate);
    d.setDate(baseDate.getDate() - baseDate.getDay() + i);

    const el = document.createElement("div");
    el.className = "day-pill";
    if (d.toDateString() === baseDate.toDateString()) el.classList.add("active");
    el.dataset.date = d.toDateString();

    const count = getDayActivityCount(d);
    const countMarkup = count > 0
      ? `<span class="day-count">${count}</span>`
      : "";

    el.innerHTML = `
      <div>${DAYS[d.getDay()]}</div>
      <div>${d.getDate()}</div>
      <div class="day-dot">${countMarkup}</div>
    `;

    el.onclick = () => scrollToDate(d);

    stripEl.appendChild(el);
  }
}
function setActiveStripDay(dateString) {
  document.querySelectorAll(".day-pill").forEach((pill) => {
    pill.classList.toggle("active", pill.dataset.date === dateString);
  });
}

// ========== Premium micro-interactions ==========
function pulseActivePill(dateString, shouldPulse = true){
  if (!shouldPulse) return;
  const pill = document.querySelector(`.day-pill[data-date="${dateString}"]`);
  if(!pill) return;
  pill.classList.remove("pulse");
  void pill.offsetWidth;
  pill.classList.add("pulse");
}

function focusDaySection(el, shouldFocus = true){
  if(!el || !shouldFocus) return;
  el.classList.remove("is-focused");
  void el.offsetWidth;
  el.classList.add("is-focused");
  setTimeout(() => el.classList.remove("is-focused"), 520);
}

function clampScrollY(y){
  const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
  return Math.max(0, Math.min(maxY, y));
}
function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

// === NOW/NEXT helpers ===
function parseMinutes(timeStr){
  // "12:00 PM" -> minutes since midnight
  const [t, mer] = timeStr.split(" ");
  let [h, m] = t.split(":").map(Number);
  if (mer === "PM" && h !== 12) h += 12;
  if (mer === "AM" && h === 12) h = 0;
  return h * 60 + m;
}

function getNowMinutes(){
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function computeUpNext(){
  if (currentLens === "isla") return null;

  const items = Array.from(document.querySelectorAll('.appt'));
  const upcoming = [];
  const nowMin = getNowMinutes();

  items.forEach(el => {
    const section = el.closest('.day-section');
    if (!section || !section.classList.contains('is-today')) return;

    const timeSlot = el.closest('.time-slot');
    const timeEl = timeSlot ? timeSlot.querySelector('.slot-time') : null;
    if(!timeEl) return;

    const timeStr = timeEl.textContent.trim();
    const min = parseMinutes(timeStr);

    if(min >= nowMin){
      upcoming.push({ el, min, timeStr });
    }
  });

  if(!upcoming.length) return null;

  upcoming.sort((a,b)=>a.min-b.min);

  const firstTime = upcoming[0].min;
  const group = upcoming.filter(i=>i.min===firstTime);

  return {
    time: group[0].timeStr,
    count: group.length
  };
}

function getMotionDuration(motion, fromDate, toDate, pixelDistance){
  const preset = MOTION_PRESETS[motion] || MOTION_PRESETS.tap;
  const dayDistance = Math.max(1, Math.abs(Math.round((toDate - fromDate) / 86400000)));
  const pxDistance = Math.abs(pixelDistance);

  if (motion === "month") {
    const duration = 420 + (dayDistance * 6.5) + (pxDistance * 0.018);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  if (motion === "week") {
    const duration = 260 + (dayDistance * 4.5) + (pxDistance * 0.012);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  if (motion === "today") {
    const duration = 170 + (pxDistance * 0.03);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  const duration = 130 + (pxDistance * 0.018);
  return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
}
function getScrollEasing(name, t){
  if (name === "easeOutQuart") {
    return 1 - Math.pow(1 - t, 4);
  }

  if (name === "easeInOutQuart") {
    return t < 0.5
      ? 8 * Math.pow(t, 4)
      : 1 - Math.pow(-2 * t + 2, 4) / 2;
  }

if (name === "easeInOutSine") {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

  if (name === "easeInOutQuint") {
    return t < 0.5
      ? 16 * Math.pow(t, 5)
      : 1 - Math.pow(-2 * t + 2, 5) / 2;
  }

  if (name === "easeInOutCubic") {
    return t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  return 1 - Math.pow(1 - t, 3);
}

function getDayTargetY(date){
  const el = document.getElementById("day-" + date.toDateString());
  if (!el) return null;

  const targetY = clampScrollY(window.scrollY + el.getBoundingClientRect().top - getTopOffset());
  return { el, targetY, dateString: date.toDateString() };
}

function snapToDate(date, { updateStrip = true, focus = false } = {}){
  const target = getDayTargetY(date);
  if (!target) return;

  baseDate = new Date(date);

  if (updateStrip) {
    buildWeekStrip();
    setActiveStripDay(target.dateString);
  }

  isProgrammaticScroll = true;
  window.scrollTo(0, target.targetY);
  window.setTimeout(() => {
    isProgrammaticScroll = false;
    focusDaySection(target.el, focus);
    updateScrollContext(target.dateString);
  }, 0);
}

function sweepWeekStrip(){
  const pills = Array.from(document.querySelectorAll(".day-pill"));
  pills.forEach((pill, index) => {
    pill.classList.remove("pulse");
    window.setTimeout(() => {
      pill.classList.add("pulse");
      window.setTimeout(() => {
        pill.classList.remove("pulse");
      }, 180);
    }, index * 14);
  });
}

function animateScrollTo(targetY, { duration, easing, onComplete } = {}){
  const startY = window.scrollY;
  const endY = clampScrollY(targetY);
  const distance = endY - startY;

  if (Math.abs(distance) < 2) {
    window.scrollTo(0, endY);
    if (typeof onComplete === "function") onComplete();
    return;
  }

  const startTime = performance.now();
  isProgrammaticScroll = true;

  function frame(now){
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    const eased = getScrollEasing(easing, t);
    window.scrollTo(0, startY + (distance * eased));

    if (t < 1) {
      requestAnimationFrame(frame);
      return;
    }

    window.scrollTo(0, endY);
    isProgrammaticScroll = false;
    if (typeof onComplete === "function") onComplete();
  }

  requestAnimationFrame(frame);
}

function navigateToDate(date, motion = "tap", options = {}){
  const target = getDayTargetY(date);
  if (!target) return;

  const preset = MOTION_PRESETS[motion] || MOTION_PRESETS.tap;
  const {
    updateStrip = true,
    pulse = motion !== "today",
    focus = true
  } = options;

  if (updateStrip) {
    setActiveStripDay(target.dateString);
  }

  if (preset.sweep) {
    sweepWeekStrip();
  }

  pulseActivePill(target.dateString, pulse);

  const duration = getMotionDuration(motion, baseDate, date, target.targetY - window.scrollY);

  animateScrollTo(target.targetY, {
    duration,
    easing: preset.easing,
    onComplete: () => {
      baseDate = new Date(date);
      buildWeekStrip();
      setActiveStripDay(target.dateString);
      window.setTimeout(() => {
        focusDaySection(target.el, focus);
      }, preset.focusDelay);
    }
  });
}

function syncStripToScroll() {
  const daySections = Array.from(document.querySelectorAll(".day-section"));
  if (!daySections.length) return;

  let closest = daySections[0];
  let closestDistance = Infinity;

  daySections.forEach((section) => {
    const rect = section.getBoundingClientRect();
    const distance = Math.abs(rect.top - getTopOffset());
    if (distance < closestDistance) {
      closest = section;
      closestDistance = distance;
    }
  });

  const activeDate = closest.id.replace("day-", "");
  const parsed = new Date(activeDate);
  if (Number.isNaN(parsed.getTime())) return;

  const currentWeekStart = new Date(baseDate);
  currentWeekStart.setDate(currentWeekStart.getDate() - currentWeekStart.getDay());
  currentWeekStart.setHours(0, 0, 0, 0);

  const currentWeekEnd = new Date(currentWeekStart);
  currentWeekEnd.setDate(currentWeekStart.getDate() + 6);
  currentWeekEnd.setHours(23, 59, 59, 999);

  baseDate = parsed;

  if (parsed < currentWeekStart || parsed > currentWeekEnd) {
    buildWeekStrip();
  }

  setActiveStripDay(activeDate);
  updateScrollContext(activeDate);
}

/* =========================
   BUILD TIMELINE
========================= */

function buildTimeline(){
  timelineEl.innerHTML = "";

  const start = new Date(timelineStartDate);
  const end = new Date(timelineEndDate);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const currentDate = new Date(d);
    const dayLabel = currentDate.toDateString();

    const shopAppointments = getAppointmentsForDate(currentDate);
    const islaActions = getLifecycleEventsForDate(currentDate);
    let renderedAppointments = shopAppointments;
    let renderedIsla = [];

    if (currentLens === "artist") {
      renderedAppointments = shopAppointments.filter((item) => item.artist === currentArtist);
    }

    if (currentLens === "isla") {
      renderedAppointments = shopAppointments;
      renderedIsla = islaActions;
    }



    const timelineItems = [];

           renderedAppointments.forEach((item) => {
      timelineItems.push({
        kind: "appointment",
               time: item.time,
        projectId: item.projectId,
        projectUrl: item.projectUrl,
        artist: item.artist,
        client: item.client,
        type: item.type,
        status: item.status,
        completionStatus: item.completionStatus,
        hereSignalPresent: item.hereSignalPresent,
        buoyState: item.completionStatus === "escalated"
          ? "escalated"
          : item.completionStatus === "blocked_missing_contact"
            ? "blocked"
            : "",
        ghost: currentLens === "isla",
        isProviderView: currentLens === "artist"
      });
    });

    renderedIsla.forEach((item) => {
      timelineItems.push({
        kind: "isla",
        time: item.time,
        projectUrl: item.projectUrl,
        type: item.type,
        client: item.client,
        artist: item.artist,
        projectContext: item.projectContext,
        detail: item.detail,
        status: item.status,
        isBlocked: item.isBlocked
      });
    });

    const timeOrder = {
      "12:00 PM": 1200,
      "2:30 PM": 1430,
      "4:00 PM": 1600,
      "6:00 PM": 1800
    };

    timelineItems.sort((a, b) => {
      const aTime = timeOrder[a.time] || 9999;
      const bTime = timeOrder[b.time] || 9999;
      return aTime - bTime;
    });

    const groupedByTime = new Map();
    timelineItems.forEach((item) => {
      if (!groupedByTime.has(item.time)) groupedByTime.set(item.time, []);
      groupedByTime.get(item.time).push(item);
    });
    const sortedTimes = Array.from(groupedByTime.keys()).sort((a, b) => parseMinutes(a) - parseMinutes(b));

    // === Now/Next logic ===
    const isToday = currentDate.toDateString() === today.toDateString();
    const nowMin = isToday ? getNowMinutes() : null;
    let nextMarked = false;
    let currentMarked = false;

    const slotMarkup = timelineItems.length
      ? sortedTimes.map((time) => {
          const items = groupedByTime.get(time);
          // check if we should insert Now marker before this slot
          const slotMin = parseMinutes(time);
          const shouldInsertNow = isToday && nowMin !== null && !nextMarked && slotMin >= nowMin;
          let nowMarker = '';
          if (shouldInsertNow) {
            nowMarker = `<div class="now-marker"><span class="now-chip">Now</span></div>`;
          }

          const inner = items.map((item) => {
            const itemMin = parseMinutes(item.time);

            // Assume 60-minute duration for now
            const isCurrent = isToday && !currentMarked && itemMin <= nowMin && (itemMin + 60) > nowMin;
            if (isCurrent) currentMarked = true;

            const isPast = isToday && itemMin < nowMin && !isCurrent;

            const isNext = isToday && !currentMarked && !nextMarked && itemMin >= nowMin;
            if (isNext) nextMarked = true;

            if (item.kind === "appointment") {
            const islaGhostClass = item.ghost ? " appt-ghost" : "";
            const stateClass = `${isPast ? ' is-past' : ''}${isCurrent ? ' is-current' : ''}${isNext ? ' is-next' : ''}`;
            return `
              <div class="appt${islaGhostClass}${stateClass}" data-project-id="${item.projectId || ""}" data-project-url="${item.projectUrl}">
                   <div class="appt-client">${item.client}</div>
                  <div class="appt-type-row">
                    <span class="rr-buoy ${item.buoyState ? `is-visible is-${item.buoyState}` : ''}" aria-hidden="true"></span>
                    <div class="appt-type">${item.type ? '· ' + item.type : ''}${item.completionStatus ? ' · ' + mapCompletionStatusLabel(item.completionStatus) : ''}${item.hereSignalPresent ? ' · HERE' : ''}${isCurrent ? '<span class="current-chip">Now</span>' : ''}${isNext ? '<span class="next-chip">Next</span>' : ''}</div>
                  </div>
                  ${item.isProviderView ? '' : `<div class="appt-artist">${item.artist}</div>`}
                </div>
              `;
            }

            const stateClass = `${isPast ? ' is-past' : ''}${isCurrent ? ' is-current' : ''}${isNext ? ' is-next' : ''}`;
            const blockedClass = item.isBlocked ? ' isla-blocked' : '';
            const statusClass = ` isla-${(item.status || 'pending').toLowerCase()}`;
            const statusLabel = mapLifecycleStatusLabel(item.status, item.isBlocked);
            return `
              <div class="isla${stateClass}${blockedClass}${statusClass}" data-project-url="${item.projectUrl}">
                <div class="isla-type">${item.type}</div>
                <div class="isla-client">
                  ${item.artist ? item.artist + ' · ' : ''}
                  ${item.client}
                  ${item.projectContext ? ' · <span style="opacity:.6">' + item.projectContext + '</span>' : ''}
                </div>
                <div class="isla-detail">${statusLabel} · ${item.detail}</div>
              </div>
            `;
          }).join("");
          return `
            ${nowMarker}
            <div class="time-slot">
              <div class="slot-time">${time}</div>
              <div class="slot-stack">${inner}</div>
            </div>
          `;
        }).join("")
      : `<div class="time-slot">
          <div class="slot-time">—</div>
          <div class="slot-stack">
            <div class="empty-state">
              <div class="empty-title">${currentLens === 'isla' ? 'No Isla actions yet' : 'Nothing scheduled'}<span class="empty-sub">${currentLens === 'isla' ? '— no touch due' : '— day is open'}</span></div>
            </div>
          </div>
        </div>`;

    const section = document.createElement("div");
    section.className = "day-section";
    if (currentDate.toDateString() === today.toDateString()) {
      section.classList.add("is-today");
    }
    section.id = "day-"+dayLabel;

    section.innerHTML = `
      <div class="day-header">
        <div class="title">${dayLabel}</div>
        ${currentDate.toDateString() === today.toDateString() 
          ? '<span class="badge-today">Today</span>' 
          : ''}
      </div>
      ${slotMarkup}
    `;

    timelineEl.appendChild(section);
  }

  wireProjectLinks();

  // --- Up Next bar logic ---
  const upNext = computeUpNext();
  const bar = document.getElementById('up-next-bar');
  const value = document.getElementById('up-next-value');

  if (currentLens === 'isla' && bar) {
    bar.style.display = 'none';
  } else if (upNext && bar && value) {
    bar.style.display = 'flex';
    value.textContent = `${upNext.time} · ${upNext.count} appointment${upNext.count > 1 ? 's' : ''}`;
  } else if (bar && value) {
    bar.style.display = 'flex';
    value.textContent = currentLens === 'artist'
      ? 'No more appointments for this artist today'
      : 'No more appointments today';
  }
}
// =========================
//   SCROLL CONTEXT
//=========================
function updateScrollContext(dateString){
  const el = document.getElementById("scroll-context");
  if(!el) return;

  const d = new Date(dateString);
  const start = new Date(d);
  start.setDate(d.getDate() - d.getDay());

  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  const options = { month: 'short', day: 'numeric' };
  const label = `${start.toLocaleDateString(undefined, options)} – ${end.toLocaleDateString(undefined, options)}`;

  el.textContent = label;
}

function setLens(lens, event){
  currentLens = lens;
if (lens === "artist") {
  const availableArtistNames = getRenderableArtistNames();
  if (!currentArtist || !availableArtistNames.includes(currentArtist)) {
    currentArtist = availableArtistNames[0] || "";
  }
}
  document.querySelectorAll(".lens-btn").forEach((btn) => {
    btn.classList.remove("active");
  });

  if (event?.currentTarget) {
    event.currentTarget.classList.add("active");
  } else {
    const btn = document.querySelector(`.lens-btn[data-lens="${lens}"]`);
    if (btn) btn.classList.add("active");
  }

   applyBusinessIdentity();
  applyLensLabels();
  syncArtistFilterVisibility();
  buildWeekStrip();
  buildTimeline();
  snapToDate(baseDate, { updateStrip: true, focus: false });
}

function syncArtistFilterVisibility() {
  if (!artistFilterRowEl) return;

  if (currentLens === "artist") {
    artistFilterRowEl.classList.add("is-visible");
applyArtistOptions();
  } else {
    artistFilterRowEl.classList.remove("is-visible");
  }
}

function setArtist(artist) {
  currentArtist = artist;
  applyBusinessIdentity();
  applyArtistOptions();
  buildWeekStrip();
  buildTimeline();
  syncStripToScroll();
}

function wireProjectLinks() {
  const appointmentItems = document.querySelectorAll(".appt[data-project-id]");
  const lifecycleItems = document.querySelectorAll(".isla[data-project-url]");

  appointmentItems.forEach((item) => {
    item.style.cursor = "pointer";
    item.addEventListener("click", () => {
      const projectId = item.getAttribute("data-project-id");
      if (projectId) {
        openProjectDrawer(projectId);
      }
    });
  });

  lifecycleItems.forEach((item) => {
    item.style.cursor = "pointer";
    item.addEventListener("click", () => {
      const url = item.getAttribute("data-project-url");
      if (url) {
        window.location.href = url;
      }
    });
  });
}

function closeProjectDrawer(){
  if (!projectDrawerOverlayEl) return;
  projectDrawerOverlayEl.classList.remove("is-open");
  projectDrawerOverlayEl.setAttribute("aria-hidden", "true");
}

async function openProjectDrawer(projectId){
  if (!projectDrawerOverlayEl || !projectDrawerTitleEl || !projectDrawerBodyEl) return;

  activeProjectDrawerTab = "overview";
  projectDrawerOverlayEl.classList.add("is-open");
  projectDrawerOverlayEl.setAttribute("aria-hidden", "false");
  projectDrawerTitleEl.textContent = "Loading project…";
  projectDrawerBodyEl.innerHTML = `<div class="project-drawer-loading">Loading project…</div>`;

  try {
    const response = await fetch(`${getApiBase()}/api/project-folder?id=${encodeURIComponent(projectId)}`);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data?.error || `Project folder load failed: ${response.status}`);
    }

    renderProjectDrawer(data, projectId);
  } catch (error) {
    console.error("Project drawer load failed:", error);
    projectDrawerTitleEl.textContent = "Project";
    projectDrawerBodyEl.innerHTML = `<div class="project-drawer-error">Could not load this project right now.</div>`;
  }
}
/* =========================
   NAVIGATION
========================= */

function scrollToDate(date){
  navigateToDate(date, "tap", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}

function scrollToDay(type){
  if(type !== "today") return;

  const visibleTodaySection = document.getElementById("day-" + today.toDateString());
  const todayRect = visibleTodaySection ? visibleTodaySection.getBoundingClientRect() : null;
  const isAlreadyToday = !!todayRect && Math.abs(todayRect.top - getTopOffset()) < 8;

  navigateToDate(today, "today", {
    updateStrip: true,
    pulse: !isAlreadyToday,
    focus: true
  });
}

function scrollToWeek(offset){
  const next = new Date(baseDate);
  next.setDate(baseDate.getDate() + (offset * 7));

  navigateToDate(next, "week", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}

function scrollToMonth(offset){
  const next = new Date(baseDate);
  next.setMonth(baseDate.getMonth() + offset);

  navigateToDate(next, "month", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}


window.addEventListener("scroll", () => {
  if (isProgrammaticScroll || scrollSyncTicking) return;
  scrollSyncTicking = true;
  window.requestAnimationFrame(() => {
    syncStripToScroll();
    scrollSyncTicking = false;
  });
});

/* =========================
   INIT
========================= */

const backTopBtn = document.getElementById("back-to-top");
if(backTopBtn){
  backTopBtn.addEventListener("click", () => {
    animateScrollTo(0, {
      duration: 260,
      easing: "easeOutCubic",
      onComplete: () => {
        syncStripToScroll();
      }
    });
  });

  window.addEventListener("scroll", () => {
    backTopBtn.classList.toggle("is-visible", window.scrollY > 520);
  });
}
if (projectDrawerCloseEl) {
  projectDrawerCloseEl.addEventListener("click", closeProjectDrawer);
}

if (projectDrawerOverlayEl) {
  projectDrawerOverlayEl.addEventListener("click", (event) => {
    if (event.target === projectDrawerOverlayEl) {
      closeProjectDrawer();
    }
  });
}

window.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    closeProjectDrawer();
  }
});

// Bootstrapper: load data, then build UI
(async function initCalendar(){
  await loadCalendarData();
  baseDate = getInitialBaseDate();
  subscribeToRealtime();
  applyBusinessIdentity();
  applyLensLabels();
  applyArtistOptions();
  syncArtistFilterVisibility();
  buildWeekStrip();
  buildTimeline();
  snapToDate(today, { updateStrip: true, focus: false });
})();

function subscribeToRealtime(){
  if (!activeShopId) return;

  if (calendarChannel) {
    supabaseClient.removeChannel(calendarChannel);
    calendarChannel = null;
  }

  calendarChannel = supabaseClient
    .channel(`calendar-live-${activeShopId}`)
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "appointments",
        filter: `shop_id=eq.${activeShopId}`
      },
      () => reloadCalendar()
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "lifecycle_events"
      },
      (payload) => {
        const changedAppointmentId = payload?.new?.appointment_id || payload?.old?.appointment_id;
        if (changedAppointmentId && activeAppointmentIds.has(changedAppointmentId)) {
          reloadCalendar();
        }
      }
    )
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "shop_roster",
        filter: `shop_id=eq.${activeShopId}`
      },
      () => reloadCalendar()
    )
    .subscribe();
}

async function reloadCalendar(){
  const previousBaseDate = new Date(baseDate);
  await loadCalendarData();
  applyBusinessIdentity();
  applyArtistOptions();
  syncArtistFilterVisibility();
  buildWeekStrip();
  buildTimeline();
  snapToDate(previousBaseDate, { updateStrip: true, focus: false });
}
