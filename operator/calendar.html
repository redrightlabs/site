<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar · RedRight</title>

<style>
:root{
  --bg:#07080b;
  --panel:#0f1217;
  --text:#efe8df;
  --muted:#a0a9b5;
  --line:rgba(255,255,255,.08);
  --accent:#ff4d4d;
  --radius:18px;
  --sans:system-ui,-apple-system;
  --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Garamond, Georgia, serif;
  --hero: "Cormorant Garamond", Garamond, Georgia, serif;
}

body{
  margin:0;
  background:linear-gradient(#06070a,#090b0f);
  color:var(--text);
  font-family:var(--serif);
}

  .shell{
    max-width:540px;
    margin:0 auto;
    padding:16px;
  }


.top-nav{
  position:sticky;
  top:0;
  z-index:20;
  padding:8px 0 10px;
  background:linear-gradient(rgba(6,7,10,.96),rgba(9,11,15,.92));
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.04);
}

  .business-identity{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:6px;
    opacity:.82;
    text-align:center;
  }

.up-next-bar{
  margin:8px 0 0;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.up-next-label{
  color:rgba(255,255,255,.5);
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.up-next-value{
  font-weight:600;
  color:#f5eee6;
}
.back-top{
  position:fixed;
  right:16px;
  bottom:20px;
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  opacity:0;
  transform:translateY(8px);
  pointer-events:none;
  transition:opacity .18s ease, transform .18s ease, background .12s ease;
}
.back-top:hover{
  background:rgba(255,255,255,.08);
}

.back-top.is-visible{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

/* =========================
   JUMP CONTROLS
========================= */

.jump-row{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.jump-btn{
  padding:7px 11px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.025);
  color:var(--text);
  font-size:12px;
  cursor:pointer;
}

/* =========================
   WEEK STRIP
========================= */

.week-strip{
  display:flex;
  justify-content:space-between;
  gap:4px;
  margin-bottom:8px;
}

.day-pill{
  flex:1;
  text-align:center;
  padding:7px 0 6px;
  border-radius:10px;
  font-size:11px;
  color:var(--muted);
  cursor:pointer;
  border:1px solid transparent;
}

.day-pill.active{
  color:#fff;
  background:rgba(255,77,77,.10);
  border-color:rgba(255,77,77,.14);
}

.day-pill:hover{
  color:#fff;
  background:rgba(255,255,255,.05);
}

  .day-dot{
    margin-top:4px;
    min-height:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:700;
    line-height:1;
    color:rgba(233,232,223,.82);
  }
  .day-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:16px;
  height:16px;
  padding:0 5px;
  border-radius:999px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.06);
  font-size:10px;
}

/* =========================
   TIMELINE
========================= */

/* Destination focus */
.day-section.is-focused{
  outline:1px solid rgba(255,77,77,.28);
  box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35);
  animation:dayFocusFade 520ms ease-out;
}

@keyframes dayFocusFade{
  0%{ box-shadow:0 0 0 2px rgba(255,77,77,.35) inset, 0 16px 36px rgba(0,0,0,.45); }
  100%{ box-shadow:0 0 0 1px rgba(255,77,77,.10) inset, 0 10px 28px rgba(0,0,0,.35); }
}

/* Week pill pulse */
.day-pill.pulse{
  animation:pillPulse 380ms ease-out;
}

@keyframes pillPulse{
  0%{ transform:scale(1); background:rgba(255,77,77,.12); }
  40%{ transform:scale(1.06); background:rgba(255,77,77,.18); }
  100%{ transform:scale(1); background:rgba(255,77,77,.12); }
}



.timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
}


.day-section{
  padding:12px 10px 10px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--panel);
}
.day-section.is-today{
  border-color:rgba(255,77,77,.22);
  box-shadow:0 0 0 1px rgba(255,77,77,.08) inset, 0 14px 34px rgba(0,0,0,.45);
}
.day-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:10px;
  color:var(--muted);
}

.day-header .title{
  color:var(--text);
}

.badge-today{
  font-size:10px;
  padding:3px 6px;
  border-radius:999px;
  background:rgba(255,77,77,.14);
  color:#ffdede;
  border:1px solid rgba(255,77,77,.25);
}
  .time-slot{
    display:grid;
    grid-template-columns:56px 1fr;
    gap:8px;
    align-items:start;
    margin-bottom:8px;
  }

  .time-slot:last-child{
    margin-bottom:0;
  }

  .slot-time{
    padding-top:8px;
    color:rgba(233,232,223,.62);
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
    white-space:nowrap;
  }

  .slot-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
  }


  /* === NOW / NEXT UP Awareness Layer === */
  .now-marker{
    position:relative;
    margin:6px 0;
    height:0;
  }
  .now-marker::before{
    content:"";
    position:absolute;
    left:56px; /* aligns with content column after time */
    right:0;
    top:-1px;
    border-top:1px dashed rgba(255,77,77,.45);
  }
  .now-chip{
    position:absolute;
    left:0;
    top:-8px;
    font-size:10px;
    padding:2px 6px;
    border-radius:999px;
    background:rgba(255,77,77,.14);
    color:#ffdede;
    border:1px solid rgba(255,77,77,.25);
  }
  .is-next{
  border-color:rgba(255,77,77,.35) !important;
  box-shadow:0 0 0 1px rgba(255,77,77,.12) inset, 0 8px 24px rgba(0,0,0,.24);
}

.is-current{
  border-color:rgba(255,77,77,.45) !important;
  box-shadow:0 0 0 1px rgba(255,77,77,.18) inset, 0 10px 28px rgba(0,0,0,.32);
}

.current-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#fff;
  background:rgba(255,77,77,.28);
  border:1px solid rgba(255,77,77,.38);
  white-space:nowrap;
}

.next-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#ffdede;
  background:rgba(255,77,77,.14);
  border:1px solid rgba(255,77,77,.24);
  white-space:nowrap;
}
  .is-past{
    opacity:.55;
  }

  .home-row{
    display:flex;
    justify-content:flex-start;
    margin-bottom:8px;
  }



.home-btn{
  position:absolute;
  left:0;
  top:0;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.015);
  color:rgba(233,232,223,.58);
  font-size:12px;
  cursor:pointer;
}

.home-btn:hover{
  background:rgba(255,255,255,.035);
  color:rgba(244,237,228,.92);
}

.lens-row{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:0 auto;
}

.lens-btn{
  padding:7px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.045);
  background:rgba(255,255,255,.015);
  color:rgba(233,232,223,.58);
  font-size:12px;
  cursor:pointer;
}

.lens-btn.active{
  color:#fff;
  background:rgba(255,77,77,.10);
  border-color:rgba(255,77,77,.16);
  box-shadow:0 0 0 1px rgba(255,77,77,.05) inset;
}
.artist-filter-row{
  display:none;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:8px;
}

.artist-filter-row.is-visible{
  display:flex;
}
.artist-filter-label{
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(233,232,223,.48);
  white-space:nowrap;
}
.artist-select{
  min-width:180px;
  padding:9px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.025);
  color:var(--text);
  font-size:13px;
  font-family:var(--serif);
  text-align:center;
  text-align-last:center;
}
.appt-ghost{
  opacity:.45;
}
/* =========================
   APPOINTMENTS
========================= */

  .appt{
    padding:8px 10px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    font-size:13px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .appt:last-child{
    margin-bottom:0;
  }

.empty-state{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.025);
  border:1px dashed rgba(255,255,255,.06);
}

.empty-title{
  font-size:12px;
  font-weight:600;
  color:rgba(255,255,255,.7);
}

.empty-sub{
  font-size:11px;
  color:rgba(255,255,255,.4);
  margin-top:2px;
}

  .appt-client{
    flex:0 1 auto;
    min-width:0;
    color:var(--text);
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .appt-type{
  flex:1 1 auto;
  min-width:0;
  margin-left:6px;
  color:rgba(233,232,223,.58);
  font-size:11px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.appt-artist{
  flex:0 0 auto;
  color:rgba(233,232,223,.45);
  font-size:11px;
  white-space:nowrap;
}
.appt,
.isla{
  transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}

.appt:hover,
.isla:hover{
  transform:translateY(-1px);
}

.appt:active,
.isla:active{
  transform:scale(.99);
}
/* =========================
   ISLA BLOCKS
========================= */

.isla{
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,77,77,.10);
  border:1px solid rgba(255,77,77,.22);
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.isla-type{
  flex:0 0 auto;
  font-weight:600;
  color:#ffdede;
  white-space:nowrap;
}

.isla-client{
  flex:1 1 auto;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.isla-detail{
  flex:0 0 auto;
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}
.command-stack{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.command-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.command-row-top{
  position:relative;
  justify-content:center;
  min-height:34px;
}
</style>
</head>

<body>
<div class="shell">
  <div class="top-nav">
    <div class="command-stack">
      <div class="business-identity" id="business-identity">Myrtle Ink Studio</div>
      <div class="command-row command-row-top">
        <button class="home-btn" onclick="goOperatorHome()">← Home</button>

        <div class="lens-row">
          <button class="lens-btn active" data-lens="shop" onclick="setLens('shop', event)" id="lens-shop-btn">Shop</button>
          <button class="lens-btn" data-lens="artist" onclick="setLens('artist', event)" id="lens-provider-btn">Artist</button>
          <button class="lens-btn" data-lens="isla" onclick="setLens('isla', event)" id="lens-isla-btn">Isla</button>
        </div>
      </div>

     <div class="artist-filter-row" id="artist-filter-row">
  <select class="artist-select" id="artist-select" onchange="setArtist(this.value)">
    <option value="Jake">Jake</option>
    <option value="Lena">Lena</option>
  </select>
</div>
    </div>
  <!-- JUMP CONTROLS -->
  <div class="jump-row">
    <button class="jump-btn" onclick="scrollToWeek(-1)">← Week</button>
    <button class="jump-btn" onclick="scrollToDay('today')">Today</button>
    <button class="jump-btn" onclick="scrollToWeek(1)">Week →</button>
    <button class="jump-btn" onclick="scrollToMonth(1)">+ Month</button>
  </div>

  <!-- WEEK STRIP -->
  <div class="week-strip" id="week-strip"></div>

  <div class="up-next-bar" id="up-next-bar" style="display:none;">
    <div class="up-next-label">Up Next</div>
    <div class="up-next-value" id="up-next-value"></div>
  </div>
  </div>

  <!-- TIMELINE -->
  <div class="timeline" id="timeline"></div>

</div>

<button id="back-to-top" class="back-top">↑</button>

<script>

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const timelineEl = document.getElementById("timeline");
const stripEl = document.getElementById("week-strip");
const artistFilterRowEl = document.getElementById("artist-filter-row");
const artistSelectEl = document.getElementById("artist-select");
const topNavEl = document.querySelector(".top-nav");
let today = new Date();
let baseDate = new Date(today);
const timelineStartDate = new Date(today);
timelineStartDate.setDate(timelineStartDate.getDate() - 120);
const timelineEndDate = new Date(today);
timelineEndDate.setDate(timelineEndDate.getDate() + 365);
let currentLens = "shop";
let currentArtist = "Jake";
const BUSINESS_PROFILE = {
  name: "Myrtle Ink Studio",
  vertical: "tattoo"
};
const CURRENT_VERTICAL = BUSINESS_PROFILE.vertical;

const LENS_LABELS = {
  tattoo: {
    shop: "Shop",
    artist: "Artist",
    isla: "Isla"
  },
  medspa: {
    shop: "Operations",
    artist: "Provider",
    isla: "Isla"
  },
  dental: {
    shop: "Front Desk",
    artist: "Doctor",
    isla: "Isla"
  }
};

function goOperatorHome(){
  window.location.href = "/operator/";
}

function applyBusinessIdentity(){
  const businessEl = document.getElementById("business-identity");
  if (businessEl) businessEl.textContent = BUSINESS_PROFILE.name;
}



function getLensLabel(lens){
  return LENS_LABELS[CURRENT_VERTICAL]?.[lens] || lens;
}

function applyLensLabels(){
  const shopBtn = document.getElementById("lens-shop-btn");
  const providerBtn = document.getElementById("lens-provider-btn");
  const islaBtn = document.getElementById("lens-isla-btn");

  if (shopBtn) shopBtn.textContent = getLensLabel("shop");
  if (providerBtn) providerBtn.textContent = getLensLabel("artist");
  if (islaBtn) islaBtn.textContent = getLensLabel("isla");
}

function getShopAppointmentsForDate(date){
  const day = date.getDay();
  const dayKey = date.toDateString();

  const patterns = {
    0: [
      { time: "12:00 PM", client: "Miss Mary", artist: "Jake", type: "Session 2/5", projectUrl: "/operator/projects.html?project=miss-mary-1" }
    ],
    1: [
      { time: "10:00 AM", client: "Alyssa R.", artist: "Jake", type: "Consult", projectUrl: "/operator/projects.html?project=alyssa-r-1" },
      { time: "12:00 PM", client: "Miss Mary", artist: "Jake", type: "Session 2/5", projectUrl: "/operator/projects.html?project=miss-mary-1" },
      { time: "12:00 PM", client: "John D.", artist: "Lena", type: "Consult", projectUrl: "/operator/projects.html?project=john-d-1" },
      { time: "2:30 PM", client: "Sarah K.", artist: "Jake", type: "Facial", projectUrl: "/operator/projects.html?project=sarah-k-1" }
    ],
    2: [
      { time: "11:00 AM", client: "Nina P.", artist: "Lena", type: "Consult", projectUrl: "/operator/projects.html?project=nina-p-1" },
      { time: "1:30 PM", client: "Chris V.", artist: "Jake", type: "Tattoo 1/3", projectUrl: "/operator/projects.html?project=chris-v-1" }
    ],
    3: [
      { time: "9:30 AM", client: "Erin W.", artist: "Jake", type: "Consult", projectUrl: "/operator/projects.html?project=erin-w-1" },
      { time: "12:00 PM", client: "Maya T.", artist: "Lena", type: "Facial", projectUrl: "/operator/projects.html?project=maya-t-1" },
      { time: "12:00 PM", client: "Leo G.", artist: "Jake", type: "Session 1/4", projectUrl: "/operator/projects.html?project=leo-g-1" },
      { time: "12:00 PM", client: "Paige H.", artist: "Lena", type: "Botox", projectUrl: "/operator/projects.html?project=paige-h-1" },
      { time: "12:00 PM", client: "Marco S.", artist: "Jake", type: "Consult", projectUrl: "/operator/projects.html?project=marco-s-1" },
      { time: "12:00 PM", client: "Dana K.", artist: "Lena", type: "Laser", projectUrl: "/operator/projects.html?project=dana-k-1" }
    ],
    4: [
      { time: "10:30 AM", client: "Rachel B.", artist: "Jake", type: "Tattoo 3/5", projectUrl: "/operator/projects.html?project=rachel-b-1" },
      { time: "1:00 PM", client: "Ivy C.", artist: "Lena", type: "Consult", projectUrl: "/operator/projects.html?project=ivy-c-1" },
      { time: "3:30 PM", client: "Theo M.", artist: "Jake", type: "Facial", projectUrl: "/operator/projects.html?project=theo-m-1" }
    ],
    5: [
      { time: "11:30 AM", client: "Olivia F.", artist: "Lena", type: "Consult", projectUrl: "/operator/projects.html?project=olivia-f-1" },
      { time: "2:00 PM", client: "Ben J.", artist: "Jake", type: "Session 4/6", projectUrl: "/operator/projects.html?project=ben-j-1" }
    ],
    6: []
  };

  return (patterns[day] || []).map((item) => ({ ...item, date: dayKey }));
}

function getIslaActionsForDate(date){
  const targetDayKey = date.toDateString();
  const actions = [];

  function addLifecycleAction(appt, actionDate, actionType, detail){
    if (actionDate.toDateString() !== targetDayKey) return;

    actions.push({
      date: targetDayKey,
      time: appt.time,
      type: actionType,
      client: appt.client,
      artist: appt.artist,
      projectContext: appt.type || "Project",
      detail,
      projectUrl: appt.projectUrl
    });
  }

  for (let offset = 0; offset <= 30; offset++) {
    const sourceDate = new Date(date);
    sourceDate.setDate(date.getDate() - offset);

    const sourceAppointments = getShopAppointmentsForDate(sourceDate);

    sourceAppointments.forEach((appt) => {
      const type = (appt.type || "").toLowerCase();

      if (type.includes("consult")) {
        const followupDate = new Date(sourceDate);
        followupDate.setDate(sourceDate.getDate() + 1);
        addLifecycleAction(appt, followupDate, "Follow-up", "Consult follow-up due");
      }

      if (type.includes("session") || type.includes("tattoo")) {
        const careWatchDate = new Date(sourceDate);
        careWatchDate.setDate(sourceDate.getDate() + 3);
        addLifecycleAction(appt, careWatchDate, "CareWatch", "Healing check-in due");

        const reviewDate = new Date(sourceDate);
        reviewDate.setDate(sourceDate.getDate() + 21);
        addLifecycleAction(appt, reviewDate, "Review", "Review request window open");
      }

      if (type.includes("facial") || type.includes("botox") || type.includes("laser")) {
        const outcomeDate = new Date(sourceDate);
        outcomeDate.setDate(sourceDate.getDate() + 2);
        addLifecycleAction(appt, outcomeDate, "Follow-up", "Outcome check-in due");

        const reviewDate = new Date(sourceDate);
        reviewDate.setDate(sourceDate.getDate() + 14);
        addLifecycleAction(appt, reviewDate, "Review", "Review request window open");
      }
    });
  }

  actions.sort((a, b) => parseMinutes(a.time) - parseMinutes(b.time));
  return actions.slice(0, Math.min(actions.length, 6));
}
let isProgrammaticScroll = false;
let scrollSyncTicking = false;

const MOTION_PRESETS = {
  tap:   { minDuration: 140, maxDuration: 220, easing: "easeOutCubic", focusDelay: 90, sweep: false },
  today: { minDuration: 180, maxDuration: 280, easing: "easeOutQuart", focusDelay: 90, sweep: false },
  week:  { minDuration: 320, maxDuration: 500, easing: "easeOutCubic", focusDelay: 105, sweep: true },
  month: { minDuration: 520, maxDuration: 760, easing: "easeInOutQuart", focusDelay: 110, sweep: true }
};

function getTopOffset() {
  const navHeight = topNavEl ? topNavEl.getBoundingClientRect().height : 0;
  return Math.round(navHeight + 10);
}

function getDayActivityCount(date){
  const shopAppointments = getShopAppointmentsForDate(date);

  if (currentLens === "artist") {
    return shopAppointments.filter((a) => a.artist === currentArtist).length;
  }

  if (currentLens === "isla") {
    return 0; // suppress Isla counts
  }

  return shopAppointments.length;
}

/* =========================
   BUILD WEEK STRIP
========================= */

function buildWeekStrip(){
  stripEl.innerHTML = "";

  for(let i=0;i<7;i++){
    const d = new Date(baseDate);
    d.setDate(baseDate.getDate() - baseDate.getDay() + i);

    const el = document.createElement("div");
    el.className = "day-pill";
    if (d.toDateString() === baseDate.toDateString()) el.classList.add("active");
    el.dataset.date = d.toDateString();

    const count = getDayActivityCount(d);
    const countMarkup = count > 0
      ? `<span class="day-count">${count}</span>`
      : "";

    el.innerHTML = `
      <div>${DAYS[d.getDay()]}</div>
      <div>${d.getDate()}</div>
      <div class="day-dot">${countMarkup}</div>
    `;

    el.onclick = () => scrollToDate(d);

    stripEl.appendChild(el);
  }
}
function setActiveStripDay(dateString) {
  document.querySelectorAll(".day-pill").forEach((pill) => {
    pill.classList.toggle("active", pill.dataset.date === dateString);
  });
}

// ========== Premium micro-interactions ==========
function pulseActivePill(dateString, shouldPulse = true){
  if (!shouldPulse) return;
  const pill = document.querySelector(`.day-pill[data-date="${dateString}"]`);
  if(!pill) return;
  pill.classList.remove("pulse");
  void pill.offsetWidth;
  pill.classList.add("pulse");
}

function focusDaySection(el, shouldFocus = true){
  if(!el || !shouldFocus) return;
  el.classList.remove("is-focused");
  void el.offsetWidth;
  el.classList.add("is-focused");
  setTimeout(() => el.classList.remove("is-focused"), 520);
}

function clampScrollY(y){
  const maxY = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
  return Math.max(0, Math.min(maxY, y));
}
function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

// === NOW/NEXT helpers ===
function parseMinutes(timeStr){
  // "12:00 PM" -> minutes since midnight
  const [t, mer] = timeStr.split(" ");
  let [h, m] = t.split(":").map(Number);
  if (mer === "PM" && h !== 12) h += 12;
  if (mer === "AM" && h === 12) h = 0;
  return h * 60 + m;
}

function getNowMinutes(){
  const n = new Date();
  return n.getHours() * 60 + n.getMinutes();
}

function computeUpNext(){
  if (currentLens === "isla") return null;

  const items = Array.from(document.querySelectorAll('.appt'));
  const upcoming = [];
  const nowMin = getNowMinutes();

  items.forEach(el => {
    const section = el.closest('.day-section');
    if (!section || !section.classList.contains('is-today')) return;

    const timeSlot = el.closest('.time-slot');
    const timeEl = timeSlot ? timeSlot.querySelector('.slot-time') : null;
    if(!timeEl) return;

    const timeStr = timeEl.textContent.trim();
    const min = parseMinutes(timeStr);

    if(min >= nowMin){
      upcoming.push({ el, min, timeStr });
    }
  });

  if(!upcoming.length) return null;

  upcoming.sort((a,b)=>a.min-b.min);

  const firstTime = upcoming[0].min;
  const group = upcoming.filter(i=>i.min===firstTime);

  return {
    time: group[0].timeStr,
    count: group.length
  };
}

function getMotionDuration(motion, fromDate, toDate, pixelDistance){
  const preset = MOTION_PRESETS[motion] || MOTION_PRESETS.tap;
  const dayDistance = Math.max(1, Math.abs(Math.round((toDate - fromDate) / 86400000)));
  const pxDistance = Math.abs(pixelDistance);

  if (motion === "month") {
    const duration = 420 + (dayDistance * 6.5) + (pxDistance * 0.018);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  if (motion === "week") {
    const duration = 260 + (dayDistance * 4.5) + (pxDistance * 0.012);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  if (motion === "today") {
    const duration = 170 + (pxDistance * 0.03);
    return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
  }

  const duration = 130 + (pxDistance * 0.018);
  return clamp(Math.round(duration), preset.minDuration, preset.maxDuration);
}
function getScrollEasing(name, t){
  if (name === "easeOutQuart") {
    return 1 - Math.pow(1 - t, 4);
  }

  if (name === "easeInOutQuart") {
    return t < 0.5
      ? 8 * Math.pow(t, 4)
      : 1 - Math.pow(-2 * t + 2, 4) / 2;
  }

if (name === "easeInOutSine") {
  return -(Math.cos(Math.PI * t) - 1) / 2;
}

  if (name === "easeInOutQuint") {
    return t < 0.5
      ? 16 * Math.pow(t, 5)
      : 1 - Math.pow(-2 * t + 2, 5) / 2;
  }

  if (name === "easeInOutCubic") {
    return t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  return 1 - Math.pow(1 - t, 3);
}

function getDayTargetY(date){
  const el = document.getElementById("day-" + date.toDateString());
  if (!el) return null;

  const targetY = clampScrollY(window.scrollY + el.getBoundingClientRect().top - getTopOffset());
  return { el, targetY, dateString: date.toDateString() };
}



function sweepWeekStrip(){
  const pills = Array.from(document.querySelectorAll(".day-pill"));
  pills.forEach((pill, index) => {
    pill.classList.remove("pulse");
    window.setTimeout(() => {
      pill.classList.add("pulse");
      window.setTimeout(() => {
        pill.classList.remove("pulse");
      }, 180);
    }, index * 14);
  });
}

function animateScrollTo(targetY, { duration, easing, onComplete } = {}){
  const startY = window.scrollY;
  const endY = clampScrollY(targetY);
  const distance = endY - startY;

  if (Math.abs(distance) < 2) {
    window.scrollTo(0, endY);
    if (typeof onComplete === "function") onComplete();
    return;
  }

  const startTime = performance.now();
  isProgrammaticScroll = true;

  function frame(now){
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    const eased = getScrollEasing(easing, t);
    window.scrollTo(0, startY + (distance * eased));

    if (t < 1) {
      requestAnimationFrame(frame);
      return;
    }

    window.scrollTo(0, endY);
    isProgrammaticScroll = false;
    if (typeof onComplete === "function") onComplete();
  }

  requestAnimationFrame(frame);
}

function navigateToDate(date, motion = "tap", options = {}){
  const target = getDayTargetY(date);
  if (!target) return;

  const preset = MOTION_PRESETS[motion] || MOTION_PRESETS.tap;
  const {
    updateStrip = true,
    pulse = motion !== "today",
    focus = true
  } = options;

  if (updateStrip) {
    setActiveStripDay(target.dateString);
  }

  if (preset.sweep) {
    sweepWeekStrip();
  }

  pulseActivePill(target.dateString, pulse);

  const duration = getMotionDuration(motion, baseDate, date, target.targetY - window.scrollY);

  animateScrollTo(target.targetY, {
    duration,
    easing: preset.easing,
    onComplete: () => {
      baseDate = new Date(date);
      buildWeekStrip();
      setActiveStripDay(target.dateString);
      window.setTimeout(() => {
        focusDaySection(target.el, focus);
      }, preset.focusDelay);
    }
  });
}

function syncStripToScroll() {
  const daySections = Array.from(document.querySelectorAll(".day-section"));
  if (!daySections.length) return;

  let closest = daySections[0];
  let closestDistance = Infinity;

  daySections.forEach((section) => {
    const rect = section.getBoundingClientRect();
    const distance = Math.abs(rect.top - getTopOffset());
    if (distance < closestDistance) {
      closest = section;
      closestDistance = distance;
    }
  });

  const activeDate = closest.id.replace("day-", "");
  const parsed = new Date(activeDate);
  if (Number.isNaN(parsed.getTime())) return;

  const currentWeekStart = new Date(baseDate);
  currentWeekStart.setDate(currentWeekStart.getDate() - currentWeekStart.getDay());
  currentWeekStart.setHours(0, 0, 0, 0);

  const currentWeekEnd = new Date(currentWeekStart);
  currentWeekEnd.setDate(currentWeekStart.getDate() + 6);
  currentWeekEnd.setHours(23, 59, 59, 999);

  baseDate = parsed;

  if (parsed < currentWeekStart || parsed > currentWeekEnd) {
    buildWeekStrip();
  }

  setActiveStripDay(activeDate);
  updateScrollContext(activeDate);
}

/* =========================
   BUILD TIMELINE
========================= */

function buildTimeline(){
  timelineEl.innerHTML = "";

  const start = new Date(timelineStartDate);
  const end = new Date(timelineEndDate);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const currentDate = new Date(d);
    const dayLabel = currentDate.toDateString();

    const shopAppointments = getShopAppointmentsForDate(currentDate);
    const islaActions = getIslaActionsForDate(currentDate);
    let renderedAppointments = shopAppointments;
    let renderedIsla = [];

    if (currentLens === "artist") {
      renderedAppointments = shopAppointments.filter((item) => item.artist === currentArtist);
    }

    if (currentLens === "isla") {
      renderedAppointments = shopAppointments;
      renderedIsla = islaActions;
    }

    const timelineItems = [];

    renderedAppointments.forEach((item) => {
      timelineItems.push({
        kind: "appointment",
        time: item.time,
        projectUrl: item.projectUrl,
        artist: item.artist,
        client: item.client,
        type: item.type,
        ghost: currentLens === "isla",
        isProviderView: currentLens === "artist"
      });
    });

    renderedIsla.forEach((item) => {
      timelineItems.push({
        kind: "isla",
        time: item.time,
        projectUrl: item.projectUrl,
        type: item.type,
        client: item.client,
        artist: item.artist,
        projectContext: item.projectContext,
        detail: item.detail
      });
    });

    const timeOrder = {
      "12:00 PM": 1200,
      "2:30 PM": 1430,
      "4:00 PM": 1600,
      "6:00 PM": 1800
    };

    timelineItems.sort((a, b) => {
      const aTime = timeOrder[a.time] || 9999;
      const bTime = timeOrder[b.time] || 9999;
      return aTime - bTime;
    });

    const groupedByTime = new Map();
    timelineItems.forEach((item) => {
      if (!groupedByTime.has(item.time)) groupedByTime.set(item.time, []);
      groupedByTime.get(item.time).push(item);
    });
    const sortedTimes = Array.from(groupedByTime.keys()).sort((a, b) => parseMinutes(a) - parseMinutes(b));

    // === Now/Next logic ===
    const isToday = currentDate.toDateString() === today.toDateString();
    const nowMin = isToday ? getNowMinutes() : null;
    let nextMarked = false;
    let currentMarked = false;

    const slotMarkup = timelineItems.length
      ? sortedTimes.map((time) => {
          const items = groupedByTime.get(time);
          // check if we should insert Now marker before this slot
          const slotMin = parseMinutes(time);
          const shouldInsertNow = isToday && nowMin !== null && !nextMarked && slotMin >= nowMin;
          let nowMarker = '';
          if (shouldInsertNow) {
            nowMarker = `<div class="now-marker"><span class="now-chip">Now</span></div>`;
          }

          const inner = items.map((item) => {
            const itemMin = parseMinutes(item.time);

            // Assume 60-minute duration for now
            const isCurrent = isToday && !currentMarked && itemMin <= nowMin && (itemMin + 60) > nowMin;
            if (isCurrent) currentMarked = true;

            const isPast = isToday && itemMin < nowMin && !isCurrent;

            const isNext = isToday && !currentMarked && !nextMarked && itemMin >= nowMin;
            if (isNext) nextMarked = true;

            if (item.kind === "appointment") {
            const islaGhostClass = item.ghost ? " appt-ghost" : "";
            const stateClass = `${isPast ? ' is-past' : ''}${isCurrent ? ' is-current' : ''}${isNext ? ' is-next' : ''}`;
            return `
              <div class="appt${islaGhostClass}${stateClass}" data-project-url="${item.projectUrl}">
                  <div class="appt-client">${item.client}</div>
                  <div class="appt-type">${item.type ? '· ' + item.type : ''}${isCurrent ? '<span class="current-chip">Now</span>' : ''}${isNext ? '<span class="next-chip">Next</span>' : ''}</div>
                  ${item.isProviderView ? '' : `<div class="appt-artist">${item.artist}</div>`}
                </div>
              `;
            }

            const stateClass = `${isPast ? ' is-past' : ''}${isCurrent ? ' is-current' : ''}${isNext ? ' is-next' : ''}`;
            return `
              <div class="isla${stateClass}" data-project-url="${item.projectUrl}">
                <div class="isla-type">${item.type}</div>
                <div class="isla-client">${item.artist ? item.artist + ' · ' : ''}${item.client}${item.projectContext ? ' · ' + item.projectContext : ''}</div>                <div class="isla-detail">${item.detail}</div>
              </div>
            `;
          }).join("");
          return `
            ${nowMarker}
            <div class="time-slot">
              <div class="slot-time">${time}</div>
              <div class="slot-stack">${inner}</div>
            </div>
          `;
        }).join("")
      : `<div class="time-slot">
          <div class="slot-time">—</div>
          <div class="slot-stack">
            <div class="empty-state">
              <div class="empty-title">${currentLens === 'isla' ? 'No Isla actions' : 'Nothing scheduled'}</div>
              <div class="empty-sub">${currentLens === 'isla' ? 'This day is quiet on automation.' : 'This day is open.'}</div>
            </div>
          </div>
        </div>`;

    const section = document.createElement("div");
    section.className = "day-section";
    if (currentDate.toDateString() === today.toDateString()) {
      section.classList.add("is-today");
    }
    section.id = "day-"+dayLabel;

    section.innerHTML = `
      <div class="day-header">
        <div class="title">${dayLabel}</div>
        ${currentDate.toDateString() === today.toDateString() 
          ? '<span class="badge-today">Today</span>' 
          : ''}
      </div>
      ${slotMarkup}
    `;

    timelineEl.appendChild(section);
  }

  wireProjectLinks();

  // --- Up Next bar logic ---
  const upNext = computeUpNext();
  const bar = document.getElementById('up-next-bar');
  const value = document.getElementById('up-next-value');

  if (currentLens === 'isla' && bar) {
    bar.style.display = 'none';
  } else if(upNext && bar && value){
    bar.style.display = 'flex';
    value.textContent = `${upNext.time} · ${upNext.count} appointment${upNext.count>1?'s':''}`;
  } else if(bar && value){
    bar.style.display = 'flex';
    value.textContent = 'No more appointments today';
  }
}
// =========================
//   SCROLL CONTEXT
//=========================
function updateScrollContext(dateString){
  const el = document.getElementById("scroll-context");
  if(!el) return;

  const d = new Date(dateString);
  const start = new Date(d);
  start.setDate(d.getDate() - d.getDay());

  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  const options = { month: 'short', day: 'numeric' };
  const label = `${start.toLocaleDateString(undefined, options)} – ${end.toLocaleDateString(undefined, options)}`;

  el.textContent = label;
}

function setLens(lens, event){
  currentLens = lens;

  document.querySelectorAll(".lens-btn").forEach((btn) => {
    btn.classList.remove("active");
  });

  if (event?.currentTarget) {
    event.currentTarget.classList.add("active");
  } else {
    const btn = document.querySelector(`.lens-btn[data-lens="${lens}"]`);
    if (btn) btn.classList.add("active");
  }

    applyLensLabels();
    syncArtistFilterVisibility();
    buildWeekStrip();
    buildTimeline();
    syncStripToScroll();
    }

function syncArtistFilterVisibility() {
  if (!artistFilterRowEl) return;

  if (currentLens === "artist") {
    artistFilterRowEl.classList.add("is-visible");
    if (artistSelectEl) artistSelectEl.value = currentArtist;
  } else {
    artistFilterRowEl.classList.remove("is-visible");
  }
}

function setArtist(artist) {
  currentArtist = artist;
  buildWeekStrip();
  buildTimeline();
  syncStripToScroll();
}

function wireProjectLinks() {
  const items = document.querySelectorAll(".appt[data-project-url], .isla[data-project-url]");

  items.forEach((item) => {
    item.style.cursor = "pointer";
    item.addEventListener("click", () => {
      const url = item.getAttribute("data-project-url");
      if (url) {
        window.location.href = url;
      }
    });
  });
}
/* =========================
   NAVIGATION
========================= */

function scrollToDate(date){
  navigateToDate(date, "tap", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}

function scrollToDay(type){
  if(type !== "today") return;

  const isAlreadyToday = baseDate.toDateString() === today.toDateString();

  navigateToDate(today, "today", {
    updateStrip: true,
    pulse: !isAlreadyToday,
    focus: true
  });
}

function scrollToWeek(offset){
  const next = new Date(baseDate);
  next.setDate(baseDate.getDate() + (offset * 7));

  navigateToDate(next, "week", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}

function scrollToMonth(offset){
  const next = new Date(baseDate);
  next.setMonth(baseDate.getMonth() + offset);

  navigateToDate(next, "month", {
    updateStrip: true,
    pulse: true,
    focus: true
  });
}


window.addEventListener("scroll", () => {
  if (isProgrammaticScroll || scrollSyncTicking) return;
  scrollSyncTicking = true;
  window.requestAnimationFrame(() => {
    syncStripToScroll();
    scrollSyncTicking = false;
  });
});

/* =========================
   INIT
========================= */

const backTopBtn = document.getElementById("back-to-top");
if(backTopBtn){
  backTopBtn.addEventListener("click", () => {
    animateScrollTo(0, {
      duration: 260,
      easing: "easeOutCubic",
      onComplete: () => {
        syncStripToScroll();
      }
    });
  });

  window.addEventListener("scroll", () => {
    backTopBtn.classList.toggle("is-visible", window.scrollY > 520);
  });
}

applyBusinessIdentity();
applyLensLabels();
syncArtistFilterVisibility();
buildWeekStrip();
buildTimeline();
syncStripToScroll();
updateScrollContext(baseDate.toDateString());
</script>
