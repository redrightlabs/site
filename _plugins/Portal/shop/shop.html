<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RedRight · Shop Overview</title>

  <link rel="stylesheet" href="../../../canon.css" />
  <link rel="stylesheet" href="../shared/portal.css" /> 
  <link rel="stylesheet" href="./shop.css" />
</head>

<body>
  <div class="wrap">
    <div class="shell">

      <header class="top" aria-label="Top bar">
        <div class="topRow">
          <span class="dot" id="buoyDot" aria-label="Buoy"></span>
          <div class="date" id="todayLabel">—</div>
        </div>

        <div class="bubbles" aria-label="Unresolved states">
          <div class="bubble" id="bBookings" role="button" tabindex="0">
            <div class="bubbleTitle">Bookings waiting</div>
            <div class="bubbleCount" id="cBookings">0</div>
          </div>
          <div class="bubble" id="bCarewatch" role="button" tabindex="0">
            <div class="bubbleTitle">CareWatch</div>
            <div class="bubbleCount" id="cCarewatch">0</div>
          </div>
          <div class="bubble" id="bPhotos" role="button" tabindex="0">
            <div class="bubbleTitle">New photos</div>
            <div class="bubbleCount" id="cPhotos">0</div>
          </div>
        </div>
      </header>

      <main class="main" aria-label="Main">
        <!-- Daily Brief — by artist -->
        <section class="card" aria-label="Daily brief">
          <div class="cardHead">
            <div class="cardTitle">Daily brief</div>
          </div>
          <div class="list" id="shopBrief"></div>
        </section>

        <!-- Weekly Overview (data-only) -->
        <section class="card" aria-label="Weekly overview">
          <div class="cardHead">
            <div class="cardTitle">Weekly overview</div>
          </div>
          <div class="bigCenter" id="weekTotal">—</div>
          <div class="smallCenter">appointments this week</div>
        </section>

        <!-- Isla Report Card — Shop -->
        <section class="card" aria-label="Isla report">
          <div class="cardHead">
            <div class="cardTitle">Isla report</div>
          </div>
          <div class="reportLine" id="shopReportLine">—</div>
        </section>
      </main>

      <div class="dock" aria-label="Dock">
        <nav class="bottomNav" aria-label="Navigation">
        <button class="tab active" type="button" data-tab="calendar">Calendar</button>
      </nav>

        <footer class="brand" aria-label="Brand">
  <img class="logo" src="../../../assets/redright-logo.png" alt="RedRight" />
  <div class="slogan">Your path to safe harbor</div>
  <div class="est">RedRight Labs · Established 2025</div>
</footer>
      </div>

    </div>
  </div>

  <div class="sheet" id="sheet" aria-hidden="true"></div>

  <script src="./shop.js"></script>
</body>
</html>
